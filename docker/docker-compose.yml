# LLDPq Docker Compose
# Usage: docker compose up -d
#
# Core config files (including devices/tracking/topology) come with
# example data baked into the image. Override with volume mounts if needed.
#
# SSH keys, Provision inventory/cache and job state persist in named volumes
# across container recreation.
#
# This default stack intentionally uses Docker bridge networking and is meant
# for monitoring. DHCP is runtime-blocked in this mode because L2 broadcasts
# cannot reach the physical provisioning network. For DHCP/ONIE provisioning
# on a Linux Docker host, use docker-compose.provisioning.yml instead.

services:
  lldpq:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: lldpq:latest
    container_name: lldpq
    privileged: true
    ports:
      - "${LLDPQ_PORT:-80}:80"
    volumes:
      # Recommended: manage ALL config from ONE directory (single mount).
      # On first run the files self-seed from the baked-in defaults; afterwards
      # they persist on the host and are editable (UI or directly). Includes:
      # devices.yaml, tracking.yaml, inventory.json, topology.dot, topology_config.yaml,
      # notifications.yaml, lldpq-users.conf, cumulus-ztp.sh, serial mapping
      # and display aliases.
      - lldpq-app-config:/home/lldpq/lldpq/config

      # Runtime settings + DHCP configuration persist here without mounting
      # over /etc itself. The entrypoint seeds this volume and keeps the normal
      # application paths as symlinks. Legacy direct-file mounts remain readable
      # for migration, but changing writes require this directory volume.
      - lldpq-system-config:/home/lldpq/lldpq/system-config
      - lldpq-ssh:/home/lldpq/.ssh
      - lldpq-ansible:/home/lldpq/ansible

      # Legacy migration compatibility. Setup can journal writes to the first
      # three files because lldpq-provision-state is mounted below. Changing
      # lldpq.conf or DHCP through the application requires the named
      # lldpq-system-config volume and fails safely while individually mounted.
      # - ./devices.yaml:/home/lldpq/lldpq/devices.yaml
      # - ./topology.dot:/var/www/html/topology.dot
      # - ./topology_config.yaml:/var/www/html/topology_config.yaml
      # - ./lldpq.conf:/etc/lldpq.conf
      # - ./dhcpd.conf:/etc/dhcp/dhcpd.conf
      # - ./dhcpd.hosts:/etc/dhcp/dhcpd.hosts

      # Optional: Ansible directory (enables VLAN/BGP reports, Fabric Config/Editor/Deploy).
      # Ansible is OFF by default in Docker; uncomment the mount + the ANSIBLE_DIR env below
      # to enable it (or toggle any time in the UI: Setup -> Integrate Ansible).
      # Replace the lldpq-ansible named-volume line above with this bind mount
      # when the Ansible project is managed directly on the host:
      # - ~/ansible:/home/lldpq/ansible:rw

      # Persistent monitoring data (survives container restart/recreation)
      - lldpq-data:/home/lldpq/lldpq/monitor-results
      - lldpq-lldp-data:/home/lldpq/lldpq/lldp-results
      - lldpq-alert-state:/home/lldpq/lldpq/alert-states
      - lldpq-lldp-jobs:/var/lib/lldpq/lldp-jobs
      - lldpq-assets-jobs:/var/lib/lldpq/assets-jobs
      - lldpq-upgrade-jobs:/var/lib/lldpq/upgrade-jobs
      - lldpq-ai-state:/var/lib/lldpq/ai
      - lldpq-provision-jobs:/var/lib/lldpq/provision-jobs
      - lldpq-provision-state:/var/lib/lldpq/provision-state
      - lldpq-dhcp-state:/var/lib/dhcp
      - lldpq-configs:/var/www/html/configs
      - lldpq-hstr:/var/www/html/hstr
      - lldpq-generated-configs:/var/www/html/generated_config_folder
      - lldpq-provision-files:/var/www/html/provision-uploads
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      # Bridge-network containers cannot serve DHCP to the physical L2.
      # The entrypoint enforces this even if a persisted UI preference is running.
      - LLDPQ_DHCP_MODE=disabled
      # First-container seed only; monitoring mode always remains stopped.
      - DHCP_AUTOSTART=false
      # Uncomment if mounting Ansible directory:
      # - ANSIBLE_DIR=/home/lldpq/ansible

volumes:
  lldpq-data:      # Monitoring results
  lldpq-lldp-data: # LLDP validation results
  lldpq-alert-state: # Alert deduplication/history state
  lldpq-lldp-jobs: # Refresh-LLDP request lifecycle state
  lldpq-assets-jobs: # Refresh-Assets request lifecycle state
  lldpq-upgrade-jobs: # Provision multi-device upgrade lifecycle state
  lldpq-ai-state: # Private Ask-AI memory, analysis and change snapshots
  lldpq-provision-jobs: # Provision discovery/post-provision job lifecycle state
  lldpq-provision-state: # Provision state + direct-file editor recovery journals
  lldpq-dhcp-state: # DHCP lease database
  lldpq-configs:   # Device configurations
  lldpq-hstr:      # Historical data
  lldpq-generated-configs: # Generated NVUE configs served to ZTP clients
  lldpq-provision-files: # Uploaded OS images + persistent ONIE aliases
  lldpq-system-config: # /etc/lldpq.conf + DHCP configuration
  lldpq-app-config: # inventory, topology, notifications, users, ZTP settings
  lldpq-ssh:       # SSH keys used to connect to switches
  lldpq-ansible:   # Ansible inventory, playbooks and host/group vars
