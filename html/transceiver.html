<!DOCTYPE html>
<html>
<head>
    <link rel="shortcut icon" href="/png/favicon.ico">
    <title>..::LLDPQ::..</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="css/auth.js"></script>
    <style>
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #1a1a1a inset !important;
            -webkit-text-fill-color: #fff !important;
            caret-color: #fff !important;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            min-height: 100vh;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #404040;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #76b900;
        }

        .last-updated {
            font-size: 13px;
            color: #888;
        }

        .action-buttons { display: flex; gap: 10px; align-items: center; }

        .btn {
            padding: 7px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
        }

        .btn-primary { background: linear-gradient(0deg, #689f38 0%, #76b900 100%); }
        .btn-primary:hover { background: linear-gradient(0deg, #76b900 0%, #8bc34a 100%); }
        .btn-secondary { background: linear-gradient(0deg, #0288d1 0%, #03a9f4 100%); }
        .btn-secondary:hover { background: linear-gradient(0deg, #03a9f4 0%, #29b6f6 100%); }

        .device-search select {
            background: #3c3c3c;
            border: 1px solid #555;
            color: #d4d4d4;
            padding: 7px 12px;
            border-radius: 4px;
            font-size: 13px;
            min-width: 220px;
        }
        .device-search select:focus { border-color: #76b900; outline: none; }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .summary-card {
            background: #252526;
            padding: 15px;
            border-radius: 6px;
            border-left: 3px solid #76b900;
        }

        .card-total { border-left-color: #76b900; }
        .card-info { border-left-color: #4fc3f7; }
        .card-warning { border-left-color: #ff9800; }
        .card-success { border-left-color: #4caf50; }

        .card-value {
            font-size: 28px;
            font-weight: bold;
        }

        .card-total .card-value { color: #76b900; }
        .card-info .card-value { color: #4fc3f7; }
        .card-warning .card-value { color: #ff9800; }
        .card-success .card-value { color: #4caf50; }

        .card-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-group label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-group select, .filter-group input {
            background: #2d2d2d;
            border: 1px solid #404040;
            color: #d4d4d4;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            min-width: 140px;
        }
        .filter-group select:focus, .filter-group input:focus { border-color: #76b900; outline: none; }

        .table-container {
            background: #252526;
            border-radius: 6px;
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: #2d2d2d;
            padding: 10px 12px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #404040;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
        }

        .data-table th:hover { color: #76b900; }

        .data-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #2d2d2d;
            font-size: 13px;
        }

        .data-table tr:hover { background: #2a2d2e; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-green { background: rgba(118, 185, 0, 0.15); color: #76b900; }
        .badge-blue { background: rgba(79, 195, 247, 0.15); color: #4fc3f7; }
        .badge-gray { background: rgba(255, 255, 255, 0.08); color: #aaa; }
        .badge-yellow { background: rgba(255, 152, 0, 0.2); color: #ff9800; }
        .badge-red { background: rgba(244, 67, 54, 0.2); color: #f44336; }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 40px;
            color: #888;
        }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid #404040;
            border-top: 2px solid #76b900;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .no-data svg { width: 48px; height: 48px; fill: #555; margin-bottom: 15px; }
        .no-data h3 { color: #999; margin-bottom: 8px; }

        .fw-mixed { color: #ff9800; font-weight: 600; }

        .sort-arrow { font-size: 10px; color: #666; margin-left: 4px; opacity: 0.5; }
        .sort-arrow::before { content: '▲▼'; }
        .sort-arrow.active { opacity: 1; color: #76b900; }
        .sort-arrow.active::before { content: ''; }

        .coverage-banner {
            margin: 0 0 18px;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .coverage-banner.hidden { display: none; }
        .coverage-banner.warn { background: #35270f; color: #ffb74d; border: 1px solid #6d511d; }
        .coverage-banner.info { background: #10222e; color: #4fc3f7; border: 1px solid #244a5c; }
        .coverage-banner .cov-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
        }

        .data-table tr.module-row { cursor: pointer; }
        .detail-row td { padding: 0; border-bottom: 1px solid #404040; }
        .detail-panel { padding: 14px 18px; background: #202020; border-left: 3px solid #4fc3f7; }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 8px 24px;
        }
        .detail-kv { display: flex; gap: 8px; padding: 3px 0; border-bottom: 1px solid #2d2d2d; }
        .detail-kv .k { color: #888; min-width: 130px; }
        .detail-kv .v { color: #d4d4d4; word-break: break-all; }
        .detail-kv .v.mono { font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <div class="page-header">
        <div>
            <div class="page-title">Transceiver Inventory</div>
            <div class="last-updated" id="last-updated"></div>
        </div>
        <div class="action-buttons">
            <div class="device-search">
                <select id="deviceSearch" onchange="filterByDevice()">
                    <option value="">Search Device...</option>
                </select>
            </div>
            <button class="btn btn-secondary" onclick="loadData()" id="btnRefresh">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/></svg>
                Refresh
            </button>
            <button class="btn btn-secondary" id="run-analysis" onclick="runTransceiverAnalysis()" title="On-demand transceiver firmware scan — separate from periodic monitoring" style="display:none;background:#ff9800;border-color:#ff9800;color:#1a1a1a;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                Run Analysis
            </button>
            <button class="btn btn-primary" onclick="downloadCSV()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/></svg>
                Download CSV
            </button>
        </div>
    </div>

    <div id="coverage-banner" class="coverage-banner hidden"></div>

    <div class="summary-grid">
        <div class="summary-card card-total">
            <div class="card-value" id="total-modules">-</div>
            <div class="card-label">Total Modules</div>
        </div>
        <div class="summary-card card-info">
            <div class="card-value" id="unique-models">-</div>
            <div class="card-label">Unique Models</div>
        </div>
        <div class="summary-card card-success">
            <div class="card-value" id="devices-count">-</div>
            <div class="card-label">Devices</div>
        </div>
        <div class="summary-card card-warning">
            <div class="card-value" id="mixed-fw">-</div>
            <div class="card-label">Mixed FW Models</div>
        </div>
    </div>

    <div class="filter-bar">
        <div class="filter-group">
            <label>Device</label>
            <select id="filter-device" onchange="renderTable()">
                <option value="">All Devices</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Part Number</label>
            <select id="filter-pn" onchange="renderTable()">
                <option value="">All Models</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Identifier</label>
            <select id="filter-id" onchange="renderTable()">
                <option value="">All Types</option>
            </select>
        </div>
        <div class="filter-group">
            <label>FW Version</label>
            <select id="filter-fw" onchange="renderTable()">
                <option value="">All Versions</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Search</label>
            <input type="text" id="filter-search" value="" placeholder="vendor, serial, port..." oninput="renderTable()">
        </div>
    </div>

    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <!-- Table renders pre-sorted by device asc, so show the active indicator from the start -->
                    <th onclick="sortBy('device')">Device <span class="sort-arrow active" id="sort-device">▲</span></th>
                    <th onclick="sortBy('port')">Port <span class="sort-arrow" id="sort-port"></span></th>
                    <th onclick="sortBy('identifier')">Identifier <span class="sort-arrow" id="sort-identifier"></span></th>
                    <th onclick="sortBy('vendor')">Vendor <span class="sort-arrow" id="sort-vendor"></span></th>
                    <th onclick="sortBy('part_number')">Part Number <span class="sort-arrow" id="sort-part_number"></span></th>
                    <th onclick="sortBy('serial')">Serial Number <span class="sort-arrow" id="sort-serial"></span></th>
                    <th onclick="sortBy('vendor_rev')">Rev <span class="sort-arrow" id="sort-vendor_rev"></span></th>
                    <th onclick="sortBy('fw_version')">FW Version <span class="sort-arrow" id="sort-fw_version"></span></th>
                    <th onclick="sortBy('cable_byte130')">Cable-Byte130 <span class="sort-arrow" id="sort-cable_byte130"></span></th>
                </tr>
            </thead>
            <tbody id="module-table">
                <tr><td colspan="9"><div class="loading"><div class="spinner"></div>Loading transceiver inventory...</div></td></tr>
            </tbody>
        </table>
    </div>

<script>
    let allModules = [];
    let summary = {};
    let sortField = 'device';
    let sortAsc = true;
    let mixedFwModels = [];
    let fwByModel = {};
    let currentFiltered = [];

    // Data older than this is flagged as stale in the coverage banner.
    const STALE_AFTER_MS = 24 * 60 * 60 * 1000;

    function esc(v) {
        return String(v == null ? '' : v).replace(/[&<>"']/g, c => (
            {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[c]
        ));
    }

    // Sort key for interface names so breakout subports order correctly:
    // swp1 < swp1s0 < swp1s1 < swp2 < swp10. Non-swp names sort last, by name.
    function portSortKey(port) {
        const m = /^swp(\d+)(?:s(\d+))?/i.exec(port || '');
        if (!m) return [Number.MAX_SAFE_INTEGER, 0, (port || '').toLowerCase()];
        return [parseInt(m[1], 10), m[2] != null ? parseInt(m[2], 10) : -1, ''];
    }

    document.addEventListener('DOMContentLoaded', loadData);

    async function loadData() {
        try {
            const resp = await fetch('/monitor-results/transceiver_inventory.json');
            const data = await resp.json();

            allModules = data.modules || [];
            summary = data.summary || {};
            mixedFwModels = summary.mixed_fw_models || [];
            fwByModel = summary.fw_versions || {};

            document.getElementById('last-updated').textContent = data.last_update
                ? 'Last Updated: ' + new Date(data.last_update).toLocaleString('sv-SE').replace('T', ' ')
                : '';

            updateSummary();
            renderBanner(data.last_update);
            populateFilters();
            renderTable();
        } catch (e) {
            showBanner('warn', 'Collection unavailable — could not load the transceiver inventory. '
                + 'The data shown may be missing or out of date.');
            document.getElementById('module-table').innerHTML =
                '<tr><td colspan="9"><div class="no-data"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><h3>No Data Yet</h3><p>Transceiver inventory will be available after the next monitor run.</p></div></td></tr>';
        }
    }

    function showBanner(kind, html) {
        const el = document.getElementById('coverage-banner');
        el.className = 'coverage-banner ' + kind;
        el.innerHTML = html;
    }

    function hideBanner() {
        const el = document.getElementById('coverage-banner');
        el.className = 'coverage-banner hidden';
        el.innerHTML = '';
    }

    // Surface summary.status_counts (skipped/failed/unreachable/no_data are
    // otherwise invisible) and flag hours-old data as stale so a partial or
    // stale collection can never read as a fully-healthy fabric.
    function renderBanner(lastUpdate) {
        const counts = summary.status_counts || {};
        const problem = (counts.failed || 0) + (counts.unreachable || 0);
        const skipped = (counts.skipped_model || 0) + (counts.skipped_unknown || 0);
        const noData = counts.no_data || 0;

        let stale = false;
        if (lastUpdate) {
            const age = Date.now() - new Date(lastUpdate).getTime();
            stale = isFinite(age) && age > STALE_AFTER_MS;
        }

        const parts = [];
        if (stale) {
            const when = lastUpdate
                ? new Date(lastUpdate).toLocaleString('sv-SE').replace('T', ' ')
                : 'unknown';
            parts.push('<strong>Data may be stale</strong> — last collected ' + esc(when) + '.');
        }
        if (problem) {
            const bits = [];
            if (counts.failed) bits.push(counts.failed + ' failed');
            if (counts.unreachable) bits.push(counts.unreachable + ' unreachable');
            parts.push('<strong>Partial coverage</strong> — ' + esc(bits.join(', '))
                + ' (these modules have no firmware data).');
        }

        if (!parts.length && !skipped && !noData) {
            hideBanner();
            return;
        }

        const badges = [];
        if (counts.ok) badges.push('<span class="cov-badge">' + counts.ok + ' ok</span>');
        if (skipped) badges.push('<span class="cov-badge">' + skipped + ' skipped</span>');
        if (noData) badges.push('<span class="cov-badge">' + noData + ' no-data</span>');
        if (problem) badges.push('<span class="cov-badge">' + problem + ' failed/unreachable</span>');

        const kind = (stale || problem) ? 'warn' : 'info';
        const msg = parts.length ? parts.join(' ') : 'Firmware scan coverage:';
        showBanner(kind, '<span>' + msg + '</span>' + badges.join(' '));
    }

    function updateSummary() {
        document.getElementById('total-modules').textContent = summary.total_modules || 0;
        document.getElementById('unique-models').textContent = summary.unique_models || 0;
        document.getElementById('devices-count').textContent = summary.devices_with_modules || 0;
        document.getElementById('mixed-fw').textContent = mixedFwModels.length;
    }

    function populateFilters() {
        const devices = [...new Set(allModules.map(m => m.device))].sort();
        const pns = [...new Set(allModules.map(m => m.part_number).filter(Boolean))].sort();
        const ids = [...new Set(allModules.map(m => m.identifier).filter(Boolean))].sort();
        const fws = [...new Set(allModules.map(m => m.fw_version).filter(Boolean))].sort();

        fillSelect('filter-device', devices);
        fillSelect('filter-pn', pns);
        fillSelect('filter-id', ids);
        fillSelect('filter-fw', fws);

        const devSearch = document.getElementById('deviceSearch');
        devSearch.innerHTML = '<option value="">Search Device...</option>' +
            devices.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
    }

    function fillSelect(id, values) {
        const sel = document.getElementById(id);
        const current = sel.value;
        const first = sel.options[0].outerHTML;
        sel.innerHTML = first + values.map(v => `<option value="${esc(v)}" ${v === current ? 'selected' : ''}>${esc(v)}</option>`).join('');
    }

    function getFilteredModules() {
        const device = document.getElementById('filter-device').value;
        const pn = document.getElementById('filter-pn').value;
        const idType = document.getElementById('filter-id').value;
        const fw = document.getElementById('filter-fw').value;
        const search = document.getElementById('filter-search').value.toLowerCase();

        return allModules.filter(m => {
            if (device && m.device !== device) return false;
            if (pn && m.part_number !== pn) return false;
            if (idType && m.identifier !== idType) return false;
            if (fw && m.fw_version !== fw) return false;
            if (search) {
                const hay = `${m.device} ${m.port} ${m.identifier} ${m.vendor} ${m.part_number} ${m.serial} ${m.vendor_rev} ${m.fw_version} ${m.cable_byte130}`.toLowerCase();
                if (!hay.includes(search)) return false;
            }
            return true;
        });
    }

    function getMajorityFw(partNumber) {
        const versions = fwByModel[partNumber];
        if (!versions) return null;
        let maxCount = 0, majorityFw = null;
        for (const [fw, count] of Object.entries(versions)) {
            if (fw !== 'unknown' && count > maxCount) {
                maxCount = count;
                majorityFw = fw;
            }
        }
        return majorityFw;
    }

    function sortBy(field) {
        if (sortField === field) {
            sortAsc = !sortAsc;
        } else {
            sortField = field;
            sortAsc = true;
        }
        document.querySelectorAll('.sort-arrow').forEach(el => {
            el.textContent = '';
            el.classList.remove('active');
        });
        const arrow = document.getElementById('sort-' + field);
        if (arrow) {
            arrow.textContent = sortAsc ? '▲' : '▼';
            arrow.classList.add('active');
        }
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('module-table');
        let filtered = getFilteredModules();

        filtered.sort((a, b) => {
            if (sortField === 'port') {
                const ka = portSortKey(a.port), kb = portSortKey(b.port);
                let cmp = ka[0] - kb[0] || ka[1] - kb[1] || ka[2].localeCompare(kb[2]);
                return sortAsc ? cmp : -cmp;
            }
            let va = (a[sortField] || '').toString().toLowerCase();
            let vb = (b[sortField] || '').toString().toLowerCase();
            return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        });

        currentFiltered = filtered;

        if (filtered.length === 0) {
            const hasData = allModules.length > 0;
            const msg = hasData
                ? 'No transceivers match your filters.'
                : 'No transceiver modules were found in the current collection.';
            tbody.innerHTML = `<tr><td colspan="9"><div class="no-data"><h3>No Modules Found</h3><p>${esc(msg)}</p></div></td></tr>`;
            return;
        }

        tbody.innerHTML = filtered.map((m, i) => {
            const isMixed = mixedFwModels.includes(m.part_number);
            const majorityFw = isMixed ? getMajorityFw(m.part_number) : null;
            const isMinority = isMixed && m.fw_version && m.fw_version !== majorityFw;

            const fwClass = isMinority ? 'fw-mixed' : '';
            let fwDisplay;
            if (m.fw_version) {
                fwDisplay = esc(m.fw_version);
                if (isMinority) fwDisplay += ' <span class="badge badge-yellow">mixed</span>';
            } else {
                fwDisplay = renderStatusBadge(m.fw_status, m.fw_status_detail);
            }

            return `<tr class="module-row" data-idx="${i}" onclick="toggleModuleDetails(this)">
                <td>${esc(m.device)}</td>
                <td><span class="badge badge-gray">${esc(m.port)}</span></td>
                <td><span class="badge badge-blue">${esc(m.identifier || '-')}</span></td>
                <td>${esc(m.vendor || '-')}</td>
                <td><strong>${esc(m.part_number || '-')}</strong></td>
                <td style="font-family: monospace; font-size: 12px; color: #999;">${esc(m.serial || '-')}</td>
                <td>${esc(m.vendor_rev || '-')}</td>
                <td class="${fwClass}">${fwDisplay}</td>
                <td style="font-family: monospace; font-size: 12px;">${esc(m.cable_byte130 || '-')}</td>
            </tr>`;
        }).join('');
    }

    // Expandable per-row detail (EVPN-MH pattern): surfaces connector and
    // firmware status detail that are collected but have no dedicated column.
    function toggleModuleDetails(row) {
        const next = row.nextElementSibling;
        if (next && next.classList.contains('detail-row')) { next.remove(); return; }
        document.querySelectorAll('#module-table tr.detail-row').forEach(r => r.remove());

        const m = currentFiltered[parseInt(row.dataset.idx, 10)];
        if (!m) return;

        const kv = (k, v, mono) =>
            `<div class="detail-kv"><span class="k">${esc(k)}</span>` +
            `<span class="v${mono ? ' mono' : ''}">${esc(v || '-')}</span></div>`;

        let fwStatus = m.fw_status || 'ok';
        if (m.fw_status_detail) fwStatus += ' (' + m.fw_status_detail + ')';

        const panel =
            '<div class="detail-panel"><div class="detail-grid">' +
            kv('Device', m.device) +
            kv('Port', m.port) +
            kv('Identifier', m.identifier) +
            kv('Connector', m.connector) +
            kv('Vendor', m.vendor) +
            kv('Part Number', m.part_number) +
            kv('Serial', m.serial, true) +
            kv('Vendor Rev', m.vendor_rev) +
            kv('FW Version', m.fw_version) +
            kv('FW Status', fwStatus) +
            kv('Cable-Byte130', m.cable_byte130, true) +
            '</div></div>';

        const tr = document.createElement('tr');
        tr.className = 'detail-row';
        tr.innerHTML = `<td colspan="9">${panel}</td>`;
        row.after(tr);
    }

    function renderStatusBadge(status, detail) {
        switch (status) {
            case 'unreachable':
                return '<span class="badge badge-red">unreachable</span>';
            case 'failed':
                return `<span class="badge badge-red" title="${esc(detail || 'failed')}">failed</span>`;
            case 'skipped_model':
                return `<span class="badge badge-gray" title="Skipped due to model: ${esc(detail || 'unknown')}">skipped (${esc(detail || 'model')})</span>`;
            case 'skipped_unknown':
                return '<span class="badge badge-gray" title="Skipped: unknown model">skipped (unknown)</span>';
            case 'no_data':
                return '<span style="color:#555">-</span>';
            default:
                return '<span style="color:#555">-</span>';
        }
    }

    function filterByDevice() {
        const dev = document.getElementById('deviceSearch').value;
        document.getElementById('filter-device').value = dev;
        renderTable();
    }

    function downloadCSV() {
        const filtered = getFilteredModules();

        // Describe any active filter so a filtered export is never mistaken
        // for the full fabric (the summary counts below are always full-fabric).
        const filterBits = [];
        const dev = document.getElementById('filter-device').value;
        const pn = document.getElementById('filter-pn').value;
        const idType = document.getElementById('filter-id').value;
        const fw = document.getElementById('filter-fw').value;
        const search = document.getElementById('filter-search').value.trim();
        if (dev) filterBits.push('device=' + dev);
        if (pn) filterBits.push('part_number=' + pn);
        if (idType) filterBits.push('identifier=' + idType);
        if (fw) filterBits.push('fw_version=' + fw);
        if (search) filterBits.push('search=' + search);

        const now = new Date();
        const counts = summary.status_counts || {};
        const skipped = (counts.skipped_model || 0) + (counts.skipped_unknown || 0);
        const headers = ['Device','Port','Identifier','Vendor','Part Number','Serial Number','Rev','FW Version','Cable-Byte130'];
        const csvField = v => `"${String(v == null ? '' : v).replace(/"/g,'""')}"`;
        const rows = filtered.map(m => [m.device, m.port, m.identifier, m.vendor, m.part_number, m.serial, m.vendor_rev, m.fw_version, m.cable_byte130].map(csvField).join(','));

        // Summary comments go BEFORE the header row (leading '#' lines) so a
        // spreadsheet or parser that skips them still reads a clean header.
        const meta = [
            '# Transceiver Inventory Report',
            '# Generated: ' + now.toLocaleString(),
            '# Total Modules: ' + (summary.total_modules != null ? summary.total_modules : allModules.length),
            '# Unique Models: ' + (summary.unique_models || 0),
            '# Devices: ' + (summary.devices_with_modules || 0),
            '# Mixed FW Models: ' + mixedFwModels.length,
            '# Status ok: ' + (counts.ok || 0),
            '# Status failed: ' + (counts.failed || 0),
            '# Status unreachable: ' + (counts.unreachable || 0),
            '# Status skipped: ' + skipped,
            '# Status no-data: ' + (counts.no_data || 0)
        ];
        if (filterBits.length) {
            meta.push('# NOTE: Rows below reflect the active filter ('
                + filterBits.join('; ') + '); summary counts above are for the full fabric.');
        }
        meta.push('#');

        const csv = [...meta, headers.join(','), ...rows].join('\n');
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'transceiver_inventory.csv';
        a.click();
        URL.revokeObjectURL(a.href);
    }

    // On-demand transceiver firmware scan. Confirms in a dark modal (explaining
    // that this is out-of-band vs periodic monitoring and which models are
    // skipped), then POSTs the trigger; lldpq-trigger runs collect-transceiver-fw.sh.
    function runTransceiverAnalysis() {
        if (typeof lldpqConfirm !== 'function') { return; }
        var message = "<span style=\"display:block;text-align:left;line-height:1.6\">" +
            "Runs an <b>on-demand transceiver firmware scan</b> (mlxlink) &mdash; this is <b>separate from</b> the periodic monitoring.<br><br>" +
            "<b>Skipped for safety</b> (mlxlink can reset the ASIC on these platforms): <code>SN2010</code>, <code>SN2100</code>, <code>SN2201</code>, <code>SN2210</code> &mdash; plus any model listed in <code>TRANSCEIVER_FW_SKIP_MODELS</code>.<br>" +
            "Devices with an <b>unknown model</b> are skipped by default (<code>TRANSCEIVER_FW_UNKNOWN_MODEL_POLICY</code>).<br>" +
            "Rate-limited to roughly once every 30&nbsp;minutes; it runs in the background and results appear here after it finishes.<br><br>" +
            "Run it now?</span>";
        lldpqConfirm('Run Transceiver Analysis', message, function () {
            fetch('/trigger-transceiver', { method: 'POST', credentials: 'same-origin' })
                .then(function (r) { return r.json().catch(function () { return {}; }); })
                .then(function (d) {
                    if (d && d.status === 'success') {
                        lldpqToast('Transceiver scan started — runs in the background; Refresh in a few minutes to see results.', 'success', 6000);
                    } else {
                        lldpqToast('Could not start: ' + ((d && d.message) || 'request failed'), 'error');
                    }
                })
                .catch(function () { lldpqToast('Could not start transceiver analysis', 'error'); });
        }, { confirmText: 'Run analysis', danger: false });
    }
</script>
