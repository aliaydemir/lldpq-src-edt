<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console - LLDPq</title>
<link rel="stylesheet" href="/css/xterm/xterm.css">
<script src="/css/auth.js"></script>
<style>
    @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal; font-weight: 400; font-display: swap;
        src: url('/css/xterm/JetBrainsMono-400.woff2?v=nf1') format('woff2');
    }
    @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal; font-weight: 700; font-display: swap;
        src: url('/css/xterm/JetBrainsMono-700.woff2?v=nf1') format('woff2');
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a1a; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ---- header ---- */
    .hdr { display: flex; align-items: center; gap: 12px; padding: 10px 16px; min-height: 52px; background: #1e1e1e; border-bottom: 1px solid #333; flex: none; }
    .hdr .spacer { flex: 1; }
    .hdr .hbtn { display: inline-flex; align-items: center; gap: 6px; background: #2d2d2d; border: 1px solid #3c3c3c; color: #ccc; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
    .hdr .hbtn:hover { border-color: #76b900; color: #76b900; }
    .hdr .hbtn svg { width: 14px; height: 14px; fill: currentColor; }
    .hdr .hbtn.active { border-color: #76b900; color: #76b900; background: #1a2e00; }

    /* broadcast bar (type once → all tabs) */
    .bcast-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #1a2410; border-top: 1px solid #3a5212; flex: none; position: relative; z-index: 5; }
    .bcast-bar[hidden] { display: none; }
    .bcast-bar .bcast-label { font-size: 12px; font-weight: 700; color: #9ccc65; white-space: nowrap; }
    .bcast-bar input { flex: 1; background: #0d0d0d; border: 1px solid #3a5212; color: #e0e0e0; border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: 'JetBrains Mono', Menlo, monospace; outline: none; }
    .bcast-bar input:focus { border-color: #76b900; }
    .bcast-bar button { background: #2d2d2d; border: 1px solid #3c3c3c; color: #ccc; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
    .bcast-bar button:hover { border-color: #76b900; color: #76b900; }

    /* ---- layout ---- */
    .wrap { flex: 1; display: flex; min-height: 0; }

    /* ---- left target list (matches Commands/Details) ---- */
    .cr-left { width: 300px; min-width: 300px; background: #252526; border-right: 1px solid #404040; display: flex; flex-direction: column; min-height: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .cr-left-header { background: linear-gradient(0deg,#76b900 0%,#5a8c00 100%); color: #fff; font-weight: bold; font-size: 16px; padding: 16px; display: flex; align-items: center; gap: 10px; }
    .cr-left-header svg { width: 20px; height: 20px; fill: #fff; }
    .cr-search { padding: 10px; border-bottom: 1px solid #404040; }
    .cr-search input { width: 100%; background: #3c3c3c; border: 1px solid #555; color: #d4d4d4; border-radius: 4px; padding: 8px 12px; font-size: 13px; outline: none; }
    .cr-search input:focus { border-color: #76b900; }
    input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0 1000px #1a1a1a inset !important; -webkit-text-fill-color: #fff !important; caret-color: #fff !important;
    }
    .cr-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .cr-count { padding: 8px 14px; font-size: 11px; color: #777; border-top: 1px solid #333; }
    .host-item, .device-item {
        display: flex; align-items: center; gap: 8px; padding: 7px 14px; font-size: 13px; color: #ccc; cursor: pointer; border-left: 3px solid transparent;
    }
    .host-item:hover, .device-item:hover { background: #2a2d2e; }
    .host-item.active, .device-item.active { background: #37373d; border-left-color: #76b900; color: #fff; }
    .host-item { color: #e0b84a; font-weight: 600; border-bottom: 1px solid #333; }
    .host-item .dot, .device-item .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; flex: none; }
    .host-item.active .dot, .device-item.active .dot { background: #76b900; }
    .group-header { display: flex; align-items: center; gap: 8px; padding: 8px 15px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #999; background: #2d2d2d; cursor: pointer; user-select: none; }
    .group-header:hover { background: #333; }
    .group-header .arrow { transition: transform .15s; font-size: 9px; }
    .group-header.collapsed .arrow { transform: rotate(-90deg); }
    .group-devices.collapsed { display: none; }
    .device-item { padding-left: 26px; }

    /* ---- terminal area ---- */
    .term-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #282828; }
    .tabs { display: flex; align-items: stretch; gap: 2px; background: #1a1a1a; border-bottom: 1px solid #333; min-height: 36px; overflow-x: auto; flex: none; }
    .tab { display: flex; align-items: center; gap: 8px; padding: 0 12px; font-size: 12px; color: #aaa; background: #232323; cursor: pointer; white-space: nowrap; border-right: 1px solid #2a2a2a; border-top: 2px solid transparent; }
    .tab:hover { background: #2a2a2a; }
    .tab.active { background: #0d0d0d; color: #fff; border-top-color: #76b900; }
    .tab .st { width: 7px; height: 7px; border-radius: 50%; background: #777; flex: none; }
    .tab.connected .st { background: #76b900; }
    .tab.closed .st { background: #ef5350; }
    .tab .x { color: #777; font-size: 14px; border-radius: 3px; padding: 0 3px; }
    .tab .x:hover { color: #fff; background: #444; }
    .term-stack { flex: 1; position: relative; min-height: 0; }
    .term-pane { position: absolute; inset: 0; padding: 6px 4px 0 8px; display: none; }
    .term-pane.active { display: flex; flex-direction: column; justify-content: flex-end; }
    .empty-hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 14px; }
    .reconnect { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 5; background: #1e1e1e; border: 1px solid #444; padding: 16px 22px; border-radius: 10px; text-align: center; color: #ccc; }
    .reconnect button { margin-top: 10px; background: #76b900; color: #0d0d0d; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; }

    /* search bar */
    .searchbar { position: absolute; top: 8px; right: 16px; z-index: 10; display: flex; gap: 6px; background: #1e1e1e; border: 1px solid #444; border-radius: 8px; padding: 6px; }
    .searchbar[hidden] { display: none; }
    .searchbar input { background: #0d0d0d; border: 1px solid #3c3c3c; color: #e0e0e0; border-radius: 5px; padding: 5px 8px; font-size: 12px; outline: none; width: 180px; }
    .searchbar input:focus { border-color: #76b900; }
    .searchbar button { background: #2d2d2d; border: 1px solid #3c3c3c; color: #ccc; border-radius: 5px; padding: 4px 8px; cursor: pointer; font-size: 12px; }
    .searchbar button:hover { border-color: #76b900; color: #76b900; }
    /* xterm.css defaults .xterm / .xterm-viewport to background:#000, so the area below the
       last rendered row shows as a black strip (e.g. above the broadcast bar). Paint these
       with the terminal background so any sub-row remainder blends in. */
    .xterm { height: 100%; background-color: #282828; }
    .xterm .xterm-viewport { background-color: #282828 !important; }
    .xterm-viewport::-webkit-scrollbar { width: 10px; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 5px; }
</style>
</head>
<body>
    <div class="wrap">
        <aside class="cr-left">
            <div class="cr-left-header">
                <svg viewBox="0 0 24 24"><path d="M20 13H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1v-6c0-.55-.45-1-1-1zM7 19c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM20 3H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V4c0-.55-.45-1-1-1zM7 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                Device Console
            </div>
            <div class="cr-search"><input type="text" id="search" placeholder="Search devices..." autocomplete="off" aria-label="Search devices" oninput="renderList()"></div>
            <div class="cr-list" id="list"></div>
            <div class="cr-count" id="count">Loading…</div>
        </aside>
        <main class="term-main">
            <div class="hdr">
                <div class="spacer"></div>
                <button class="hbtn" id="askAiBtn" onclick="askAIaboutSelection()" title="Send the selected terminal output to Ask AI">Ask AI</button>
                <button class="hbtn" id="bcastBtn" onclick="toggleBroadcast()" title="Broadcast — type once, send to ALL open tabs"><b>B</b></button>
                <button class="hbtn" onclick="fontStep(-1)" title="Smaller font">A−</button>
                <button class="hbtn" onclick="fontStep(1)" title="Larger font">A+</button>
                <button class="hbtn" onclick="openSearch()" title="Search (Ctrl+F)" aria-label="Search terminal"><svg viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg></button>
                <button class="hbtn" onclick="copyAll()" title="Copy buffer" aria-label="Copy terminal buffer"><svg viewBox="0 0 24 24"><path d="M16,1H4C2.9,1 2,1.9 2,3V17H4V3H16V1M19,5H8C6.9,5 6,5.9 6,7V21C6,22.1 6.9,23 8,23H19C20.1,23 21,22.1 21,21V7C21,5.9 20.1,5 19,5M19,21H8V7H19V21Z"/></svg></button>
                <button class="hbtn" onclick="downloadLog()" title="Download session log" aria-label="Download session log"><svg viewBox="0 0 24 24"><path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z"/></svg></button>
            </div>
            <div class="tabs" id="tabs" role="tablist" aria-label="Console sessions"></div>
            <div class="term-stack" id="stack">
                <div class="empty-hint" id="emptyHint">Select a target on the left to open a session.</div>
                <div class="searchbar" id="searchbar" hidden>
                    <input type="text" id="searchInput" placeholder="Find in terminal…" aria-label="Find in terminal" onkeydown="if(event.key==='Enter'){event.shiftKey?searchPrev():searchNext()} if(event.key==='Escape')closeSearch()">
                    <button onclick="searchPrev()" title="Previous">↑</button>
                    <button onclick="searchNext()" title="Next">↓</button>
                    <button onclick="closeSearch()" title="Close">✕</button>
                </div>
            </div>
            <div class="bcast-bar" id="bcastBar" hidden>
                <span class="bcast-label">Broadcast →</span>
                <input id="bcastInput" autocomplete="off" placeholder="send commands to all tabs" aria-label="Broadcast command to connected sessions" onkeydown="if(event.key==='Enter'){event.preventDefault();broadcastSend()} if(event.key==='Escape'){closeBroadcast()}">
                <button onclick="closeBroadcast()" title="Close broadcast">✕</button>
            </div>
        </main>
    </div>

    <script src="/css/xterm/xterm.js"></script>
    <script src="/css/xterm/addon-fit.js"></script>
    <script src="/css/xterm/addon-web-links.js"></script>
    <script src="/css/xterm/addon-search.js"></script>
    <script src="/css/xterm/addon-unicode11.js"></script>
    <script>
    const HOST_TARGET = '__lldpq_host__';
    // Imported 1:1 from the user's iTerm2 "Default" profile (mine.itermcolors).
    const XTERM_THEME = {
        background: '#282828', foreground: '#e8dcb7',
        cursor: '#e8dcb7', cursorAccent: '#282828',
        selectionBackground: '#645c55', selectionForeground: '#e8dcb7',
        black: '#282828', red: '#bb362a', green: '#989736', yellow: '#ce9c3e',
        blue: '#558387', magenta: '#a66685', cyan: '#749c6f', white: '#a59a86',
        brightBlack: '#8f8476', brightRed: '#e85841', brightGreen: '#b9bb46', brightYellow: '#f1bf4f',
        brightBlue: '#8aa499', brightMagenta: '#c8899b', brightCyan: '#98bf83', brightWhite: '#e8dcb7'
    };
    let fontSize = parseInt(localStorage.getItem('lldpq_console_font') || '14', 10);

    let devicesByGroup = {};   // group -> [hostnames]
    let groupOrder = [];
    let allTargets = [];       // {id,label,group}
    let inventoryLoadedSuccessfully = false;
    const collapsed = {};
    const sessions = {};       // id -> {target,label,term,fit,search,ws,paneEl,tabEl,log,connected}
    let activeId = null;
    let seq = 0;

    document.addEventListener('DOMContentLoaded', async () => {
        if (window.LLDPqAuth) {
            const ok = await LLDPqAuth.check();
            if (!ok) return;
            if (!LLDPqAuth.isAdmin()) {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#888;font-family:sans-serif;">Access denied. Admin only.</div>';
                return;
            }
        }
        // Load the terminal webfont BEFORE opening any xterm so glyph metrics are correct
        // (otherwise xterm measures a fallback font and rendering looks off).
        try { await document.fonts.load("14px 'JetBrains Mono'"); await document.fonts.load("700 14px 'JetBrains Mono'"); } catch(e){}
        await loadDevices();
        restoreTabs();   // reopen + reattach sessions that were open before navigating away
        // deep-link: ?target=<hostname> (e.g. from Ask AI "Open Console") auto-opens that target
        try {
            const tgt = new URLSearchParams(window.location.search).get('target');
            if (tgt) {
                history.replaceState(null, '', window.location.pathname);
                if (tgt === HOST_TARGET) openTarget(HOST_TARGET, 'LLDPq host');
                else {
                    const host = allTargets.find(h => h.toLowerCase() === tgt.toLowerCase());
                    if (host) openTarget(host, host);
                }
            }
        } catch (e) {}
        window.addEventListener('resize', () => { const s = sessions[activeId]; if (s) snug(s); });
        // Re-measure terminals once the webfont is fully active (in case any opened early).
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => {
                for (const id in sessions) {
                    const t = sessions[id];
                    // A no-op setter never fires onOptionChange, so nudge the value to force
                    // xterm to re-measure glyph metrics now that the webfont is active.
                    try { const fs = t.term.options.fontSize; t.term.options.fontSize = fs + 0.0001; t.term.options.fontSize = fs; } catch(e){}
                    snug(t);
                }
            });
        }
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f' && activeId) { e.preventDefault(); openSearch(); }
        });
    });

    async function loadDevices() {
        inventoryLoadedSuccessfully = false;
        try {
            const r = await fetch('/fabric-api.sh?action=list-devices', { cache: 'no-store' });
            const data = await r.json();
            if (!data.success || !data.devices) throw new Error(data.error || 'Failed to load devices');
            devicesByGroup = {}; groupOrder = Object.keys(data.devices); allTargets = [];
            for (const [group, list] of Object.entries(data.devices)) {
                const names = list.map(d => d.hostname).filter(Boolean)
                    .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
                if (!names.length) continue;
                devicesByGroup[group] = names;
                names.forEach(n => allTargets.push(n));
            }
            inventoryLoadedSuccessfully = true;
            renderList();
            document.getElementById('count').textContent = `${allTargets.length} device${allTargets.length === 1 ? '' : 's'} + LLDPq host`;
        } catch (e) {
            inventoryLoadedSuccessfully = false;
            document.getElementById('list').innerHTML = `<div style="padding:16px;color:#ef5350;">${esc(e.message)}</div>`;
            document.getElementById('count').textContent = '';
        }
    }

    function makeInteractive(el, activate, role) {
        el.setAttribute('role', role || 'button');
        el.tabIndex = 0;
        el.addEventListener('click', activate);
        el.addEventListener('keydown', e => {
            if (e.key !== 'Enter' && e.key !== ' ') return;
            e.preventDefault();
            activate(e);
        });
        return el;
    }

    function makeTargetItem(className, text, target, label) {
        const active = activeTarget() === target;
        const item = document.createElement('div');
        item.className = className + (active ? ' active' : '');
        item.setAttribute('aria-current', active ? 'true' : 'false');
        makeInteractive(item, () => openTarget(target, label));

        const dot = document.createElement('span');
        dot.className = 'dot';
        const caption = document.createElement('span');
        caption.textContent = text;
        item.appendChild(dot);
        item.appendChild(caption);
        return item;
    }

    function renderList() {
        const f = (document.getElementById('search').value || '').toLowerCase();
        const fragment = document.createDocumentFragment();
        if (!f || 'lldpq host this server'.includes(f)) {
            fragment.appendChild(makeTargetItem('host-item', '★ LLDPq (this server)', HOST_TARGET, 'LLDPq host'));
        }
        groupOrder.forEach((group, groupIndex) => {
            const names = (devicesByGroup[group] || []).filter(n => n.toLowerCase().includes(f));
            if (!names.length) return;
            // Collapsed by default; a group counts as open only if explicitly opened
            // (collapsed[group] === false). While searching, matching groups auto-expand.
            const open = f ? true : (collapsed[group] === false);
            const isCol = open ? '' : ' collapsed';
            const groupId = `console-group-${groupIndex}`;

            const header = document.createElement('div');
            header.className = 'group-header' + isCol;
            header.setAttribute('aria-expanded', String(open));
            header.setAttribute('aria-controls', groupId);
            makeInteractive(header, () => toggleGroup(group));
            const arrow = document.createElement('span');
            arrow.className = 'arrow';
            arrow.textContent = '▼';
            header.appendChild(arrow);
            header.appendChild(document.createTextNode(`${group} (${names.length})`));
            fragment.appendChild(header);

            const groupDevices = document.createElement('div');
            groupDevices.className = 'group-devices' + isCol;
            groupDevices.id = groupId;
            groupDevices.dataset.group = group;
            groupDevices.setAttribute('aria-hidden', String(!open));
            names.forEach(n => {
                groupDevices.appendChild(makeTargetItem('device-item', n, n, n));
            });
            fragment.appendChild(groupDevices);
        });
        document.getElementById('list').replaceChildren(fragment);
    }

    function toggleGroup(g) { collapsed[g] = (collapsed[g] === false) ? true : false; renderList(); }
    function activeTarget() { return sessions[activeId] ? sessions[activeId].target : null; }

    // ---------------- sessions / tabs ----------------
    function openTarget(target, label, sid) {
        if (!sid) {
            // user click: focus an existing tab for this target instead of duplicating
            for (const id in sessions) { if (sessions[id].target === target) { switchTo(id); return; } }
            sid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : 'cs' + Date.now() + Math.random().toString(16).slice(2);
        }
        const id = 'cs' + (++seq);
        const pane = document.createElement('div');
        pane.className = 'term-pane';
        pane.id = id + '-panel';
        pane.setAttribute('role', 'tabpanel');
        document.getElementById('stack').appendChild(pane);

        const term = new Terminal({
            fontFamily: "'JetBrains Mono', Menlo, Consolas, 'DejaVu Sans Mono', monospace",
            fontSize: fontSize, lineHeight: 1.2, cursorBlink: true, cursorStyle: 'block',
            scrollback: 5000, allowProposedApi: true, theme: XTERM_THEME, macOptionIsMeta: true,
            screenReaderMode: true
        });
        const fit = new FitAddon.FitAddon();
        const search = new SearchAddon.SearchAddon();
        term.loadAddon(fit);
        term.loadAddon(search);
        term.loadAddon(new WebLinksAddon.WebLinksAddon());
        try { const u = new Unicode11Addon.Unicode11Addon(); term.loadAddon(u); term.unicode.activeVersion = '11'; } catch(e){}
        term.open(pane);

        const sess = { id, sid, target, label, term, fit, search, ws: null, paneEl: pane, tabEl: null, log: '', connected: false, closing: false };
        sessions[id] = sess;

        // copy-on-select (PuTTY/iTerm style) — bound to mouseup so the clipboard write
        // happens inside a real user gesture (browsers block it from onSelectionChange).
        pane.addEventListener('mouseup', () => { const sel = term.getSelection(); if (sel) copyText(sel); });
        // Ctrl+Shift+V / Ctrl+Shift+C ; leave Ctrl+C as SIGINT
        term.attachCustomKeyEventHandler(ev => {
            if (ev.type !== 'keydown') return true;
            if ((ev.ctrlKey || ev.metaKey) && ev.shiftKey && (ev.key === 'V' || ev.key === 'v')) { doPaste(sess); return false; }
            if ((ev.ctrlKey || ev.metaKey) && ev.shiftKey && (ev.key === 'C' || ev.key === 'c')) {
                copyText(term.getSelection()); return false;
            }
            return true;
        });
        pane.addEventListener('contextmenu', e => { e.preventDefault(); doPaste(sess); });
        // Intercept ordinary Ctrl/Cmd+V as well as the explicit shortcuts above. Without
        // this capture listener xterm's native paste handler would bypass multiline review.
        pane.addEventListener('paste', e => {
            e.preventDefault();
            e.stopPropagation();
            if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
            const txt = e.clipboardData && e.clipboardData.getData('text/plain');
            if (typeof txt === 'string') pasteText(sess, txt);
            else doPaste(sess);
        }, true);
        term.onData(d => { if (sess.ws && sess.ws.readyState === 1) sess.ws.send(JSON.stringify({ t: 'i', d })); });
        term.onResize(({ cols, rows }) => { if (sess.ws && sess.ws.readyState === 1) sess.ws.send(JSON.stringify({ t: 'r', c: cols, r: rows })); });

        buildTab(sess);
        switchTo(id);
        connect(sess);
        renderList();
        saveTabs();
    }

    function buildTab(sess) {
        const tab = document.createElement('div');
        tab.className = 'tab';
        tab.id = sess.id + '-tab';
        tab.setAttribute('aria-controls', sess.paneEl.id);
        tab.setAttribute('aria-selected', 'false');
        makeInteractive(tab, () => switchTo(sess.id), 'tab');

        const status = document.createElement('span');
        status.className = 'st';
        status.setAttribute('aria-hidden', 'true');
        const caption = document.createElement('span');
        caption.className = 'lbl';
        caption.textContent = sess.label;
        const close = document.createElement('span');
        close.className = 'x';
        close.title = 'Close';
        close.setAttribute('aria-label', `Close ${sess.label} console`);
        makeInteractive(close, e => { e.stopPropagation(); closeSession(sess.id); });
        close.textContent = '✕';
        tab.appendChild(status);
        tab.appendChild(caption);
        tab.appendChild(close);
        document.getElementById('tabs').appendChild(tab);
        sess.paneEl.setAttribute('aria-labelledby', tab.id);
        sess.tabEl = tab;
    }

    function switchTo(id) {
        activeId = id;
        document.getElementById('emptyHint').style.display = 'none';
        closeSearch();
        for (const sid in sessions) {
            const s = sessions[sid];
            const on = sid === id;
            s.paneEl.classList.toggle('active', on);
            s.tabEl.classList.toggle('active', on);
            s.tabEl.setAttribute('aria-selected', String(on));
        }
        const s = sessions[id];
        if (s) {
            setTimeout(() => { snug(s); s.term.focus(); }, 0);
        }
        renderList();
    }

    function sendTerminalSize(sess) {
        if (!sess || !sess.ws || sess.ws.readyState !== WebSocket.OPEN) return;
        const cols = Number(sess.term.cols);
        const rows = Number(sess.term.rows);
        if (!Number.isInteger(cols) || !Number.isInteger(rows) || cols < 1 || rows < 1) return;
        sess.ws.send(JSON.stringify({ t: 'r', c: cols, r: rows }));
    }

    function connect(sess, options) {
        options = options || {};
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        let ws;
        try {
            ws = new WebSocket(`${proto}://${location.host}/console-ws?target=${encodeURIComponent(sess.target)}&sid=${encodeURIComponent(sess.sid)}`);
        } catch (e) {
            const detail = 'unable to start the console connection';
            sess.connected = false;
            sess.tabEl.classList.remove('connected'); sess.tabEl.classList.add('closed');
            showReconnect(sess, detail);
            return;
        }
        ws.binaryType = 'arraybuffer';
        sess.ws = ws;
        const dec = new TextDecoder('utf-8', { fatal: false });
        ws.onopen = () => {
            if (sess.ws !== ws || sess.closing) return;
            if (options.resetOnOpen) {
                try { sess.term.reset(); } catch (e) { try { sess.term.clear(); } catch (_) {} }
                sess.log = '';
            }
            sess.connected = true;
            sess.reconnectAttempts = 0;
            if (sess.reconnectTimer) { clearTimeout(sess.reconnectTimer); sess.reconnectTimer = null; }
            sess.tabEl.classList.add('connected'); sess.tabEl.classList.remove('closed');
            snug(sess);
            // FitAddon only emits onResize when dimensions changed. Explicitly send the
            // fitted size so a newly opened socket never remains at the bridge's 80x24.
            sendTerminalSize(sess);
            clearReconnect(sess);
            sess.term.focus();
        };
        ws.onmessage = (e) => {
            if (sess.ws !== ws || sess.closing) return;
            let text;
            if (typeof e.data === 'string') { text = e.data; sess.term.write(text); }
            else { const u = new Uint8Array(e.data); text = dec.decode(u, { stream: true }); sess.term.write(u); }
            sess.log += text.replace(/\0/g, '');
            if (sess.log.length > 4000000) sess.log = sess.log.slice(-3000000);
        };
        ws.onclose = event => {
            if (sess.ws !== ws || sess.closing) return;
            sess.connected = false;
            sess.tabEl.classList.remove('connected'); sess.tabEl.classList.add('closed');
            const detail = closeDescription(event);
            sess.term.write(`\r\n\x1b[90m• ${detail}\x1b[0m\r\n`);
            if (shouldAutoReconnect(event && Number(event.code))) scheduleReconnect(sess, detail);
            else showReconnect(sess, detail);
        };
        ws.onerror = () => { try { ws.close(); } catch(e){} };
    }

    // Auto-reconnect only on transient/unexpected closes, never on policy rejections
    // (1008) or application close codes (4xxx) that mean "do not retry".
    function shouldAutoReconnect(code) {
        return code === 1006 || code === 1012 || code === 1013;
    }
    function scheduleReconnect(sess, detail) {
        if (sess.closing) return;
        sess.reconnectAttempts = (sess.reconnectAttempts || 0) + 1;
        if (sess.reconnectAttempts > 6) { showReconnect(sess, detail); return; }
        const delay = Math.min(15000, 500 * Math.pow(2, sess.reconnectAttempts - 1));
        showReconnect(sess, `${detail} — reconnecting…`);
        if (sess.reconnectTimer) clearTimeout(sess.reconnectTimer);
        sess.reconnectTimer = setTimeout(() => {
            sess.reconnectTimer = null;
            if (sess.closing) return;
            connect(sess, { resetOnOpen: true });
        }, delay);
    }

    function closeDescription(event) {
        const reason = String((event && event.reason) || '').replace(/[\x00-\x1f\x7f-\x9f]/g, ' ').trim().slice(0, 160);
        if (reason) return `disconnected: ${reason}`;
        const code = event && Number(event.code);
        const descriptions = {
            1000: 'session closed normally',
            1001: 'connection closed because the endpoint went away',
            1005: 'connection closed without a status',
            1006: 'connection lost unexpectedly',
            1008: 'connection rejected by the server',
            1011: 'console service encountered an error',
            1012: 'console service is restarting',
            1013: 'console service is temporarily unavailable'
        };
        return descriptions[code] || (code ? `connection closed (code ${code})` : 'disconnected');
    }

    function showReconnect(sess, detail) {
        let box = sess.paneEl.querySelector('.reconnect');
        if (!box) {
            box = document.createElement('div');
            box.className = 'reconnect';
            const message = document.createElement('div');
            message.className = 'reconnect-message';
            const button = document.createElement('button');
            button.textContent = 'Reconnect';
            button.addEventListener('click', () => {
                button.disabled = true;
                sess.reconnectAttempts = 0;
                if (sess.reconnectTimer) { clearTimeout(sess.reconnectTimer); sess.reconnectTimer = null; }
                connect(sess, { resetOnOpen: true });
            });
            box.appendChild(message);
            box.appendChild(button);
            sess.paneEl.appendChild(box);
        }
        const message = box.querySelector('.reconnect-message');
        message.replaceChildren(document.createTextNode('Session to '));
        const label = document.createElement('b');
        label.textContent = sess.label;
        message.appendChild(label);
        message.appendChild(document.createTextNode(` ${detail || 'disconnected'}.`));
        const button = box.querySelector('button');
        button.disabled = false;
        button.textContent = 'Reconnect';
    }
    function clearReconnect(sess) { const b = sess.paneEl.querySelector('.reconnect'); if (b) b.remove(); }

    // Deliver {t:'end'} over a brand-new short-lived socket with the same sid. Used when the
    // tab's own socket is already down, so reattach-then-kill still terminates the live PTY.
    function terminateRemote(sess) {
        try {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            // kill=1 tells the bridge this attach is teardown-only: if the sid is
            // already gone it must close without spawning a fresh SSH session.
            const ws = new WebSocket(`${proto}://${location.host}/console-ws?target=${encodeURIComponent(sess.target)}&sid=${encodeURIComponent(sess.sid)}&kill=1`);
            ws.onopen = () => { try { ws.send(JSON.stringify({ t: 'end' })); } catch (e) {} try { ws.close(); } catch (e) {} };
            ws.onerror = () => { try { ws.close(); } catch (e) {} };
        } catch (e) {}
    }

    function closeSession(id) {
        const s = sessions[id];
        if (!s) return;
        s.closing = true;
        if (s.reconnectTimer) { clearTimeout(s.reconnectTimer); s.reconnectTimer = null; }
        // Explicit close → tell the bridge to kill the PTY (navigation-away does NOT send this,
        // so those sessions stay alive for reattach). If our socket is already down, reattach
        // with the same sid solely to deliver {t:'end'} so the session is not orphaned.
        try {
            if (s.ws && s.ws.readyState === 1) s.ws.send(JSON.stringify({ t: 'end' }));
            else terminateRemote(s);
        } catch(e){}
        try { if (s.ws) s.ws.close(); } catch(e){}
        try { s.term.dispose(); } catch(e){}
        s.paneEl.remove(); s.tabEl.remove();
        delete sessions[id];
        saveTabs();
        if (activeId === id) {
            const rest = Object.keys(sessions);
            activeId = null;
            if (rest.length) switchTo(rest[rest.length - 1]);
            else { document.getElementById('emptyHint').style.display = 'flex'; }
        }
        renderList();
    }

    function pasteText(sess, txt) {
        if (!txt) return;
        const paste = () => {
            if (!sess.ws || sess.ws.readyState !== WebSocket.OPEN) {
                showToast('Paste skipped because this console is disconnected.', 'warning');
                return;
            }
            // xterm's paste API normalizes newlines and applies bracketed-paste mode
            // before emitting through the existing onData transport.
            sess.term.paste(txt);
        };
        if (/[\r\n]/.test(txt)) {
            const lines = txt.split(/\r\n|\r|\n/).length;
            requestConfirmation(
                'Paste multiple lines',
                `Paste ${lines} lines into this console? Newlines may execute commands immediately.`,
                paste,
                { confirmText: 'Paste', danger: false }
            );
        } else {
            paste();
        }
    }

    async function doPaste(sess) {
        try {
            pasteText(sess, await navigator.clipboard.readText());
        } catch (e) {
            showToast('Clipboard access was denied. Allow clipboard access and try again.', 'error');
        }
    }

    function showToast(message, type) {
        if (typeof window.lldpqToast === 'function') window.lldpqToast(message, type || 'info');
    }

    function requestConfirmation(title, message, onConfirm, options) {
        if (typeof window.lldpqConfirm === 'function') {
            window.lldpqConfirm(title, esc(message), onConfirm, options || {});
            return;
        }
        if (window.confirm(`${title}\n\n${message}`)) onConfirm();
    }

    // Robust copy: async clipboard when allowed, execCommand fallback (http / blocked).
    function copyText(text) {
        if (!text) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).catch(() => execCopy(text));
        } else {
            execCopy(text);
        }
    }
    function execCopy(text) {
        try {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;top:0;left:-9999px;opacity:0;';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        } catch (e) {}
        const s = sessions[activeId]; if (s) s.term.focus();   // execCommand steals focus → restore
    }

    // ---------------- header actions ----------------
    function fontStep(d) {
        fontSize = Math.max(9, Math.min(24, fontSize + d));
        localStorage.setItem('lldpq_console_font', String(fontSize));
        for (const id in sessions) { sessions[id].term.options.fontSize = fontSize; snug(sessions[id]); }
    }
    function copyAll() {
        const s = sessions[activeId]; if (!s) return;
        s.term.selectAll();
        copyText(s.term.getSelection());
        s.term.clearSelection();
    }
    // Hand the current terminal selection to Ask AI ("explain this output").
    function askAIaboutSelection() {
        const s = sessions[activeId];
        const sel = s ? s.term.getSelection() : '';
        const btn = document.getElementById('askAiBtn');
        if (!sel || !sel.trim()) {
            const o = btn.textContent; btn.textContent = 'select output first';
            setTimeout(() => { btn.textContent = o; }, 1500);
            return;
        }
        const label = s ? s.label : 'a device';
        const prompt = `Explain this terminal output from ${label} and flag anything wrong or noteworthy:\n\n${sel.slice(0, 4000)}`;
        try { sessionStorage.setItem('lldpq_ai_ask', prompt); } catch (e) {}
        window.location.href = 'ai.html';
    }
    function downloadLog() {
        const s = sessions[activeId]; if (!s) return;
        const cleaned = s.log
            .replace(/\0/g, '')
            .replace(/\x1b\][\s\S]*?(?:\x07|\x1b\\)/g, '')   // OSC (e.g. window title \x1b]0;…\x07)
            .replace(/\x1b\[[0-9;?]*[A-Za-z]/g, '')          // CSI
            .replace(/\x1b[()][0-9A-Za-z]/g, '')             // 2-byte charset designation
            .replace(/\x1b[=>]/g, '');                       // keypad application mode
        const blob = new Blob([cleaned], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `console-${s.label.replace(/[^a-z0-9]+/gi, '_')}-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'')}.log`;
        a.click(); URL.revokeObjectURL(a.href);
    }

    // ---------------- search ----------------
    function openSearch() { if (!activeId) return; const b = document.getElementById('searchbar'); b.hidden = false; document.getElementById('searchInput').focus(); }
    function closeSearch() { document.getElementById('searchbar').hidden = true; }
    function searchNext() { const s = sessions[activeId]; if (s) s.search.findNext(document.getElementById('searchInput').value); }
    function searchPrev() { const s = sessions[activeId]; if (s) s.search.findPrevious(document.getElementById('searchInput').value); }

    // ---------------- persistence (sessions survive iframe reloads via server reattach) ----------------
    function saveTabs() {
        try {
            const tabs = Object.keys(sessions).map(id => ({ sid: sessions[id].sid, target: sessions[id].target, label: sessions[id].label }));
            sessionStorage.setItem('lldpq_console_tabs', JSON.stringify(tabs));
        } catch (e) {}
    }
    function restoreTabs() {
        let tabs;
        try { tabs = JSON.parse(sessionStorage.getItem('lldpq_console_tabs') || '[]'); } catch (e) { tabs = null; }
        if (!Array.isArray(tabs)) {
            try { sessionStorage.removeItem('lldpq_console_tabs'); } catch (e) {}
            return;
        }
        const seenSids = new Set();
        const seenTargets = new Set();
        const valid = [];
        for (const t of tabs) {
            if (!t || typeof t !== 'object' || Array.isArray(t)) continue;
            if (typeof t.sid !== 'string' || !/^[A-Za-z0-9_-]{1,64}$/.test(t.sid)) continue;
            if (typeof t.target !== 'string' || t.target.length < 1 || t.target.length > 255 || /[\x00-\x1f\x7f]/.test(t.target)) continue;
            if (Object.prototype.hasOwnProperty.call(t, 'label') &&
                (typeof t.label !== 'string' || t.label.length > 255 || /[\x00-\x1f\x7f]/.test(t.label))) continue;

            let target = t.target;
            if (target !== HOST_TARGET && inventoryLoadedSuccessfully) {
                const lower = target.toLowerCase();
                target = allTargets.find(candidate => candidate.toLowerCase() === lower) || null;
                if (!target) continue;
            }
            const targetKey = target === HOST_TARGET ? HOST_TARGET : target.toLowerCase();
            if (seenSids.has(t.sid) || seenTargets.has(targetKey)) continue;
            seenSids.add(t.sid); seenTargets.add(targetKey);
            valid.push({ sid: t.sid, target, label: target === HOST_TARGET ? 'LLDPq host' : target });
            if (valid.length >= 128) break;
        }
        if (JSON.stringify(valid) !== JSON.stringify(tabs)) {
            try { sessionStorage.setItem('lldpq_console_tabs', JSON.stringify(valid)); } catch (e) {}
        }
        valid.forEach(t => openTarget(t.target, t.target === HOST_TARGET ? 'LLDPq host' : t.target, t.sid));
    }

    // ---------------- broadcast (type once → all open tabs) ----------------
    let broadcasting = false;
    // Fit to the container, then pin the terminal element to the EXACT rendered row height
    // and bottom-align it (.term-pane is flex-end) so the last row sits flush against the
    // broadcast bar / bottom — eliminating xterm's sub-row remainder (the "1 row" gap).
    function snug(sess) {
        if (!sess) return;
        try { sess.fit.fit(); } catch (e) {}
        requestAnimationFrame(() => {
            try {
                const el = sess.term.element;
                const scr = el && el.querySelector('.xterm-screen');
                if (scr && scr.offsetHeight) el.style.height = scr.offsetHeight + 'px';
            } catch (e) {}
        });
    }
    function refitActive() { const s = sessions[activeId]; if (s) setTimeout(() => snug(s), 0); }
    function toggleBroadcast() {
        broadcasting = !broadcasting;
        document.getElementById('bcastBtn').classList.toggle('active', broadcasting);
        document.getElementById('bcastBar').hidden = !broadcasting;
        refitActive();   // reflow so the bar shows immediately (and the terminal resizes around it)
        if (broadcasting) document.getElementById('bcastInput').focus();
    }
    function closeBroadcast() {
        broadcasting = false;
        document.getElementById('bcastBtn').classList.remove('active');
        document.getElementById('bcastBar').hidden = true;
        refitActive();
        const s = sessions[activeId]; if (s) s.term.focus();
    }
    function broadcastSend() {
        const inp = document.getElementById('bcastInput');
        const cmd = inp.value;
        if (!cmd) {
            showToast('Broadcast skipped because the command is empty.', 'warning');
            return;
        }
        const all = Object.values(sessions);
        const connected = all.filter(s => s.ws && s.ws.readyState === WebSocket.OPEN);
        if (!connected.length) {
            showToast('Broadcast skipped because no console sessions are connected.', 'warning');
            return;
        }
        const send = () => {
            let sent = 0;
            connected.forEach(s => {
                if (s.ws && s.ws.readyState === WebSocket.OPEN) {
                    try {
                        s.ws.send(JSON.stringify({ t: 'i', d: cmd + '\r' }));
                        sent += 1;
                    } catch (e) {}
                }
            });
            const nowSkipped = all.length - sent;
            if (sent) showToast(`Broadcast sent to ${sent} tab${sent === 1 ? '' : 's'}.`, 'info');
            if (nowSkipped) showToast(`Broadcast skipped ${nowSkipped} disconnected target${nowSkipped === 1 ? '' : 's'}.`, 'warning');
            if (sent) inp.value = '';   // placeholder stays "send commands to all tabs"
        };
        send();
    }

    function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    </script>
</body>
</html>
