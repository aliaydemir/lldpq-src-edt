<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>..::LLDPQ::..</title>
    <link rel="shortcut icon" href="/png/favicon.ico">
    <script src="/css/auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            min-height: 100vh;
        }
        
        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #404040;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #76b900;
        }
        
        .last-updated {
            font-size: 13px;
            color: #888;
        }
        
        /* Dashboard Section */
        .dashboard-section {
            background: #2d2d2d;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .section-header {
            padding: 12px 16px;
            background: #333;
            font-weight: 600;
            font-size: 14px;
            color: #76b900;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #404040;
        }
        
        .section-content {
            padding: 20px;
        }
        
        /* File Selector */
        .file-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .file-dropdown {
            padding: 10px 14px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #3c3c3c;
            color: #d4d4d4;
            font-size: 13px;
            min-width: 350px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .file-dropdown:focus {
            outline: none;
            border-color: #76b900;
        }
        
        .file-dropdown:hover {
            border-color: #76b900;
        }
        
        /* Results Container */
        .results-container {
            background: #2d2d2d;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 600px;
            overflow: hidden;
            display: none;
        }
        
        .results-container.show {
            display: block;
        }
        
        .results-header {
            padding: 12px 16px;
            background: #333;
            border-bottom: 1px solid #404040;
            font-weight: 600;
            font-size: 14px;
            color: #76b900;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .results-content {
            padding: 16px;
            white-space: pre-wrap;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.5;
            max-height: 520px;
            overflow-y: auto;
        }
        
        /* Syntax Colors */
        .steelBlue { color: #4fc3f7; font-weight: bold; }
        .tomato { color: #ff6347; font-weight: bold; }
        .red { color: #f44336; font-weight: bold; }
        .green { color: #76b900; }
        .lime { color: #8bd400; }
        .dim { color: #888; }
        
        /* Messages */
        .loading-text {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .error-text {
            text-align: center;
            padding: 20px;
            color: #ff6b6b;
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 6px;
            margin: 20px 0;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <!-- Page Header -->
    <div class="page-header">
        <div>
            <div class="page-title">LLDP Result Archive</div>
            <div class="last-updated">Last Updated: <span id="last-updated"></span></div>
        </div>
    </div>
    
    <!-- Archive Section -->
    <div class="dashboard-section">
        <div class="section-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3,3H21V7H3V3M4,8H20V21H4V8M9.5,11A0.5,0.5 0 0,0 9,11.5V13H15V11.5A0.5,0.5 0 0,0 14.5,11H9.5Z"/>
            </svg>
            Historical LLDP Results
        </div>
        <div class="section-content">
            <div class="file-selector">
                <select id="fileDropdown" class="file-dropdown" onchange="handleFileSelection()">
                    <option value="">-- Select a historical result file --</option>
                </select>
                <select id="compareDropdown" class="file-dropdown" onchange="handleCompareSelection()" style="display: none;">
                    <option value="">-- Compare with... --</option>
                </select>
            </div>
        </div>
    </div>
    
    <!-- Results Display -->
    <div id="resultsContainer" class="results-container">
        <div class="results-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
            </svg>
            <span id="fileName">Selected File</span>
        </div>
        <div id="metinAlani" class="results-content"></div>
    </div>

    <!-- Diff Display -->
    <div id="diffContainer" class="results-container">
        <div class="results-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
            </svg>
            <span id="diffTitle">Comparison</span>
        </div>
        <div id="diffAlani" class="results-content"></div>
    </div>

    <div id="loadingText" class="loading-text" style="display: none;">
        Loading file content...
    </div>

    <script>
        function setLastUpdated() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            };
            const formattedDate = now.toLocaleString('en-US', options);
            document.getElementById('last-updated').textContent = formattedDate;
        }

        let fetchToken = 0;
        let compareToken = 0;
        let currentFileText = '';
        let currentFileName = '';

        function formatFileLabel(fileName) {
            const match = fileName.match(/^Problems-(\d{4}-\d{2}-\d{2})--(\d{2})-(\d{2})/);
            return match ? `${match[1]} ${match[2]}:${match[3]}` : fileName;
        }

        function listFiles() {
            fetch('/hstr/')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(data => {
                    const parser = new DOMParser();
                    const htmlDoc = parser.parseFromString(data, 'text/html');
                    const files = Array.from(htmlDoc.querySelectorAll('a')).map(a => a.href).filter(href => href.includes('Problems'));
                    const fileDropdown = document.getElementById('fileDropdown');
                    const compareDropdown = document.getElementById('compareDropdown');

                    const fileNames = files.map(file => file.split('/').pop());
                    fileNames.sort((a, b) => b.localeCompare(a));

                    if (fileNames.length === 0) {
                        showEmptyState('No archived results yet');
                        return;
                    }

                    fileNames.forEach(fileName => {
                        const option = document.createElement('option');
                        option.value = fileName;
                        option.textContent = formatFileLabel(fileName);
                        fileDropdown.appendChild(option);
                        compareDropdown.appendChild(option.cloneNode(true));
                    });

                    const hashFile = decodeURIComponent(location.hash.slice(1));
                    if (hashFile && fileNames.includes(hashFile)) {
                        fileDropdown.value = hashFile;
                        handleFileSelection();
                    }
                })
                .catch(error => {
                    console.error('Error fetching file list:', error);
                    showError('Error loading file list: ' + error.message);
                });
        }

        function handleFileSelection() {
            const fileDropdown = document.getElementById('fileDropdown');
            const selectedFile = fileDropdown.value;
            resetCompare();
            if (selectedFile) {
                history.replaceState(null, '', '#' + encodeURIComponent(selectedFile));
                fetchFileContent(selectedFile);
            } else {
                history.replaceState(null, '', location.pathname + location.search);
                hideResults();
            }
        }

        function fetchFileContent(fileName) {
            const token = ++fetchToken;
            showLoading();

            fetch(`/hstr/${fileName}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(data => {
                    if (token !== fetchToken) return;
                    hideLoading();
                    currentFileText = data;
                    currentFileName = fileName;
                    document.getElementById('fileName').textContent = fileName;
                    displayLLDPResults(data);
                    showResults();
                    document.getElementById('compareDropdown').style.display = '';
                })
                .catch(error => {
                    if (token !== fetchToken) return;
                    hideLoading();
                    showError('Error fetching LLDP results: ' + error.message);
                });
        }

        function resetCompare() {
            compareToken++;
            const compareDropdown = document.getElementById('compareDropdown');
            compareDropdown.value = '';
            compareDropdown.style.display = 'none';
            document.getElementById('diffContainer').classList.remove('show');
        }

        function handleCompareSelection() {
            const compareDropdown = document.getElementById('compareDropdown');
            const compareFile = compareDropdown.value;
            const diffContainer = document.getElementById('diffContainer');
            if (!compareFile || !currentFileName) {
                compareToken++;
                diffContainer.classList.remove('show');
                return;
            }
            const token = ++compareToken;
            fetch(`/hstr/${compareFile}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(data => {
                    if (token !== compareToken) return;
                    document.getElementById('diffTitle').textContent = `${formatFileLabel(currentFileName)} vs ${formatFileLabel(compareFile)}`;
                    displayDiff(data, currentFileText);
                    diffContainer.classList.add('show');
                })
                .catch(error => {
                    if (token !== compareToken) return;
                    showError('Error fetching compare file: ' + error.message);
                });
        }

        function displayDiff(oldText, newText) {
            const oldLines = oldText.split('\n');
            const newLines = newText.split('\n');

            const counts = new Map();
            oldLines.forEach(line => counts.set(line, (counts.get(line) || 0) + 1));
            const added = newLines.map(line => {
                const count = counts.get(line) || 0;
                if (count > 0) {
                    counts.set(line, count - 1);
                    return false;
                }
                return true;
            });
            counts.clear();
            newLines.forEach(line => counts.set(line, (counts.get(line) || 0) + 1));
            const removed = oldLines.map(line => {
                const count = counts.get(line) || 0;
                if (count > 0) {
                    counts.set(line, count - 1);
                    return false;
                }
                return true;
            });

            const element = document.getElementById('diffAlani');
            element.innerHTML = '';
            const fragment = document.createDocumentFragment();
            const appendLine = (prefix, line, colorClass) => {
                const span = document.createElement('span');
                span.className = colorClass;
                span.textContent = prefix + line;
                fragment.appendChild(span);
                fragment.appendChild(document.createElement('br'));
            };

            let i = 0, j = 0;
            while (i < oldLines.length || j < newLines.length) {
                if (i < oldLines.length && removed[i]) {
                    appendLine('- ', oldLines[i], 'tomato');
                    i++;
                } else if (j < newLines.length && added[j]) {
                    appendLine('+ ', newLines[j], 'green');
                    j++;
                } else if (i < oldLines.length && j < newLines.length) {
                    appendLine('  ', newLines[j], 'dim');
                    i++;
                    j++;
                } else if (j < newLines.length) {
                    appendLine('  ', newLines[j], 'dim');
                    j++;
                } else {
                    appendLine('  ', oldLines[i], 'dim');
                    i++;
                }
            }
            element.appendChild(fragment);
        }

        function displayLLDPResults(results) {
            const element = document.getElementById('metinAlani');
            element.innerHTML = '';
            
            const fragment = document.createDocumentFragment();
            const lines = results.split('\n');
            lines.forEach(line => {
                // Column-aware coloring: banners/headers keep their color and
                // data rows are matched on the Status field (column 2), so a
                // hostname containing 'Fail'/'Pass' can never repaint a row.
                let colorClass = 'lime';
                if (line.startsWith('===') || line.startsWith('Created on')) {
                    colorClass = 'steelBlue';
                } else {
                    const status = line.trim().split(/\s+/)[1] || '';
                    if (status === 'Fail') {
                        colorClass = 'tomato';
                    } else if (status === 'No-Info') {
                        colorClass = 'red';
                    } else if (status === 'Pass') {
                        colorClass = 'green';
                    }
                }

                const span = document.createElement('span');
                span.className = colorClass;
                span.textContent = line;
                fragment.appendChild(span);
                fragment.appendChild(document.createElement('br'));
            });
            element.appendChild(fragment);
        }

        function showLoading() {
            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('resultsContainer').classList.remove('show');
        }

        function hideLoading() {
            document.getElementById('loadingText').style.display = 'none';
        }

        function showResults() {
            document.getElementById('resultsContainer').classList.add('show');
        }

        function hideResults() {
            document.getElementById('resultsContainer').classList.remove('show');
        }

        function showEmptyState(message) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'loading-text';
            emptyDiv.textContent = message;
            const fileSelector = document.querySelector('.file-selector');
            fileSelector.parentNode.insertBefore(emptyDiv, fileSelector.nextSibling);
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-text';
            errorDiv.textContent = message;
            
            // Remove any existing error messages
            const existingError = document.querySelector('.error-text');
            if (existingError) {
                existingError.remove();
            }
            
            // Insert error message after file selector
            const fileSelector = document.querySelector('.file-selector');
            fileSelector.parentNode.insertBefore(errorDiv, fileSelector.nextSibling);
            
            // Auto-remove error after 5 seconds
            setTimeout(() => {
                if (errorDiv.parentNode) {
                    errorDiv.remove();
                }
            }, 5000);
        }

        window.onload = async function() {
            const ok = await LLDPqAuth.check();
            if (!ok) return;
            setLastUpdated();
            listFiles();
        };
    </script>
</body>
</html>
