<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/png/favicon.ico">
    <title>..::LLDPQ:: Commands</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="/css/auth.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body { background:#1e1e1e; color:#d4d4d4; font-family:'Segoe UI',Roboto,sans-serif; }
        .cr-container { display:flex; height:100vh; overflow:hidden; }

        /* autofill override (keep dark theme) */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #1a1a1a inset !important;
            -webkit-text-fill-color: #fff !important;
            caret-color: #fff !important;
        }

        /* ---------------- Left: target selector ---------------- */
        .cr-left { width:300px; min-width:300px; background:#252526; border-right:1px solid #404040; display:flex; flex-direction:column; }
        .cr-left-header { background:linear-gradient(0deg,#76b900 0%,#5a8c00 100%); color:#fff; font-weight:bold; font-size:16px; padding:16px; display:flex; align-items:center; gap:10px; }
        .cr-left-header svg { width:20px; height:20px; fill:#fff; }
        .cr-search { padding:10px; border-bottom:1px solid #404040; }
        .cr-search input { width:100%; padding:8px 12px; background:#3c3c3c; color:#d4d4d4; border:1px solid #555; border-radius:4px; font-size:13px; }
        .cr-search input:focus { outline:none; border-color:#76b900; }
        .cr-targetlist { flex:1; overflow-y:auto; padding:6px 0; }
        .cr-count { padding:10px 15px; border-top:1px solid #404040; background:#2d2d2d; color:#888; font-size:12px; }

        .cr-all { display:flex; align-items:center; gap:10px; margin:6px 10px 10px; padding:11px 12px; border-radius:6px; cursor:pointer; background:#2d2d2d; border:1px solid #404040; }
        .cr-all:hover { border-color:#76b900; }
        .cr-all.selected { background:#2c3a12; border-color:#76b900; }
        .cr-all .cr-all-icon { width:22px; height:22px; border-radius:5px; background:#76b900; color:#1a1a1a; font-weight:700; display:flex; align-items:center; justify-content:center; font-size:13px; }
        .cr-all .cr-all-label { font-weight:600; color:#fff; font-size:13px; }
        .cr-all .cr-all-sub { color:#9a9a9a; font-size:11px; margin-left:auto; }

        .device-group { margin:0; }
        .group-header { display:flex; align-items:center; gap:8px; padding:8px 15px; cursor:pointer; background:#2d2d2d; color:#999; font-size:11px; font-weight:bold; text-transform:uppercase; letter-spacing:1px; user-select:none; }
        .group-header:hover { background:#333; }
        .group-header .arrow { font-size:9px; transition:transform .15s; }
        .group-header.collapsed .arrow { transform:rotate(-90deg); }
        .group-devices { overflow:hidden; }
        .group-devices.collapsed { display:none; }
        .device-item { display:flex; align-items:center; gap:8px; padding:7px 14px 7px 20px; cursor:pointer; font-size:13px; color:#cfcfcf; border-left:2px solid transparent; }
        .device-item:hover { background:#2a2d2e; }
        .device-item.selected { background:#37373d; border-left-color:#76b900; color:#fff; }
        .device-item .device-icon { width:8px; height:8px; border-radius:50%; background:#76b900; flex:none; }
        .cr-targetlist input[type=checkbox] { accent-color:#76b900; width:15px; height:15px; cursor:pointer; flex:none; margin:0; }

        /* ---------------- Right: runner ---------------- */
        .cr-right { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .cr-target-banner { padding:13px 18px; background:#252526; border-bottom:1px solid #333; font-size:13px; color:#d4d4d4; }
        .cr-target-banner strong { color:#76b900; }

        .cr-groupsbar { display:flex; flex-wrap:wrap; gap:6px; padding:12px 16px 0; }
        .cr-chip { display:flex; align-items:center; gap:7px; padding:8px 12px; background:#252526; border:1px solid #3a3a3a; border-radius:6px; cursor:pointer; font-size:12px; color:#d4d4d4; }
        .cr-chip:hover { border-color:#555; }
        .cr-chip.active { background:#2d2d2d; border-color:currentColor; }
        .cr-chip .dot { width:9px; height:9px; border-radius:2px; }

        .cr-grouppanel { display:flex; flex-wrap:wrap; gap:7px; padding:12px 16px; min-height:10px; }
        .cmd-btn { padding:7px 12px; background:#2a2a2a; border:1px solid #3c3c3c; border-radius:5px; color:#dcdcaa; font-size:12px; font-family:'Cascadia Code',Consolas,monospace; cursor:pointer; }
        .cmd-btn:hover { background:#333; border-color:#76b900; color:#fff; }

        .cr-custom { display:flex; gap:8px; padding:6px 16px 14px; border-bottom:1px solid #333; }
        .cr-custom input { flex:1; padding:9px 12px; background:#111; color:#d4d4d4; border:1px solid #404040; border-radius:6px; font-family:'Cascadia Code',Consolas,monospace; font-size:13px; }
        .cr-custom input:focus { outline:none; border-color:#76b900; }
        .cr-custom button { padding:9px 22px; background:#76b900; color:#1a1a1a; font-weight:700; border:0; border-radius:6px; cursor:pointer; }
        .cr-custom button:hover { background:#8fd400; }
        .cr-custom button:disabled { background:#555; color:#999; cursor:not-allowed; }
        .cr-custom button.stop { background:#ef5350; color:#fff; }
        .cr-custom button.stop:hover { background:#f4675f; }

        .cr-results { flex:1; overflow-y:auto; padding:14px 16px; }
        .cr-empty { color:#777; text-align:center; padding:50px 0; }
        .cr-summary { display:flex; gap:18px; align-items:center; margin-bottom:12px; font-size:13px; color:#aaa; flex-wrap:wrap; }
        .cr-summary .s-val { color:#fff; font-weight:600; }
        .cr-summary .s-ok { color:#81c784; }
        .cr-summary .s-fail { color:#ef5350; }
        .cr-summary .s-cmd { font-family:'Cascadia Code',Consolas,monospace; color:#9cdcfe; }

        .rescard { background:#252526; border:1px solid #333; border-radius:6px; margin-bottom:8px; overflow:hidden; }
        .rescard-head { display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; user-select:none; }
        .rescard-head:hover { background:#2a2a2a; }
        .rescard-host { font-weight:600; color:#fff; font-size:13px; }
        .rescard-arrow { margin-left:auto; color:#888; font-size:10px; transition:transform .15s; }
        .rescard.open .rescard-arrow { transform:rotate(90deg); }
        .rescard-out { display:none; margin:0; padding:12px; background:#111; color:#d4d4d4; font-family:'Cascadia Code',Consolas,monospace; font-size:12px; line-height:1.5; white-space:pre-wrap; max-height:480px; overflow:auto; border-top:1px solid #333; }
        .rescard.open .rescard-out { display:block; }
        .badge { font-size:11px; font-weight:700; padding:2px 9px; border-radius:10px; text-transform:uppercase; letter-spacing:.3px; }
        .badge-running { background:#3a3a1a; color:#ffd54f; }
        .badge-ok { background:#1f3a1f; color:#81c784; }
        .badge-fail { background:#3a1f1f; color:#ef5350; }
    </style>
    <link rel="stylesheet" type="text/css" href="/css/mobile.css">
</head>
<body>
    <div class="cr-container">
        <!-- LEFT: target selector -->
        <div class="cr-left">
            <div class="cr-left-header">
                <svg viewBox="0 0 24 24"><path d="M9.4 16.6 4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0L19.2 12l-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                Command Runner
            </div>
            <div class="cr-search">
                <input type="text" id="deviceSearch" placeholder="Search devices..." autocomplete="off" oninput="filterDevices()">
            </div>
            <div class="cr-targetlist" id="targetList">
                <div style="padding:16px;color:#888;">Loading devices…</div>
            </div>
            <div class="cr-count" id="deviceCount">Loading…</div>
        </div>

        <!-- RIGHT: runner -->
        <div class="cr-right">
            <div class="cr-target-banner" id="targetBanner">Select one or more devices on the left (checkboxes), then run a command.</div>

            <div class="cr-groupsbar" id="groupsBar"></div>
            <div class="cr-grouppanel" id="groupPanel"></div>

            <div class="cr-custom">
                <input type="text" id="customCmd" autocomplete="off" placeholder="Enter command (nv show ..., ip ..., sudo ...)  — runs on the selected devices">
                <button id="runBtn" onclick="runCustomCommand()">Run</button>
                <button id="stopBtn" class="stop" onclick="stopRun()" style="display:none;">Stop</button>
            </div>

            <div class="cr-results" id="results">
                <div class="cr-empty">Pick targets and a command (preset or custom) to run.</div>
            </div>
        </div>
    </div>

<script>
// ---- command presets (mirror Device Details -> Command Runner, Cumulus Linux / NVUE) ----
const CMD_GROUPS = [
    { title:'System & Hardware', color:'#76b900', cmds:['nv show system','nv show platform','nv show platform environment','nv show system memory','uptime','free -h','df -h','sudo sensors','sudo smonctl','sudo decode-syseeprom','sudo cl-resource-query'] },
    { title:'Interfaces', color:'#4fc3f7', cmds:['nvt','nv show interface','nv show interface --view=brief','nv show interface status','nv show interface lldp','ip link show','ip -br addr show'] },
    { title:'Layer 2 / Bridge / MLAG', color:'#ba68c8', cmds:['nv show bridge domain br_default','nv show bridge domain br_default mac-table','nv show bridge domain br_default vlan','sudo clagctl','/sbin/bridge fdb show','/sbin/bridge vlan show','sudo lldpctl','ip neigh show'] },
    { title:'BGP & Routing', color:'#ffb74d', cmds:['nv show router bgp',"sudo vtysh -c 'show bgp summary'","sudo vtysh -c 'show ip route'","sudo vtysh -c 'show bgp l2vpn evpn summary'"] },
    { title:'EVPN & VXLAN', color:'#4db6ac', cmds:['nv show evpn vni',"sudo vtysh -c 'show evpn vni'","sudo vtysh -c 'show evpn mac vni all'"] },
    { title:'EVPN Multi-Homing', color:'#f06292', cmds:['nv show evpn multihoming','nv show interface bonds',"sudo vtysh -c 'show evpn es'","sudo vtysh -c 'show evpn es-evi'","sudo vtysh -c 'show evpn es detail'"] },
    { title:'Config', color:'#9cdcfe', cmds:['nv config show','nv config diff','nv config show -o commands'] },
    { title:'Logs', color:'#ef5350', cmds:['sudo journalctl -p err -n 100 --no-pager','sudo journalctl -n 100 --no-pager'] },
];

const POOL = 4;             // max parallel device sessions (single-worker fcgiwrap — keep low)
const CMD_TIMEOUT_MS = 45000;
const NGINX_CAP_MS = 60000; // nginx caps fabric-api.sh at 60s; run-device-command has no background path
const MAX_TRIES = 3;        // retries on backend device_busy (flock contention)

let devicesByGroup = {};
let groupOrder = [];
let allHostnames = [];
const selected = new Set();  // selected hostnames (multi-select)
let running = false;
let cancelled = false;
let controllers = new Set(); // in-flight AbortControllers, so Stop can abort them

// Mirror the server rule: default 45s, but if the command carries `timeout <N>`,
// wait N+15s — capped at the nginx 60s ceiling (no background path for commands).
function cmdTimeoutMs(cmd) {
    const m = String(cmd).match(/\btimeout\s+(\d+)/);
    if (m) {
        const secs = parseInt(m[1], 10);
        if (secs > 0) return Math.min((secs + 15) * 1000, NGINX_CAP_MS);
    }
    return CMD_TIMEOUT_MS;
}

document.addEventListener('DOMContentLoaded', async () => {
    // Command Runner is admin-only (backend run-device-command requires admin)
    if (window.LLDPqAuth) {
        const ok = await LLDPqAuth.check();
        if (!ok) return;
        if (!LLDPqAuth.isAdmin()) {
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#888;font-family:sans-serif;">Access denied. Admin only.</div>';
            return;
        }
    }
    renderGroupsBar();
    showGroup(0);
    await loadDevices();
    applyPrefillFromURL();   // prefill from Ask AI "Run in Commands" (devices + cmd), never auto-runs
    // command preset buttons (event delegation — safe for commands containing quotes)
    document.getElementById('groupPanel').addEventListener('click', e => {
        const btn = e.target.closest('.cmd-btn');
        if (btn && btn.dataset.cmd) runOnTarget(btn.dataset.cmd);
    });
    document.getElementById('customCmd').addEventListener('keypress', e => { if (e.key === 'Enter') runCustomCommand(); });
    // target-list selection via event delegation + data-* attrs (safe for hostnames/groups with quotes)
    document.getElementById('targetList').addEventListener('click', e => {
        const grpCb = e.target.closest('.grp-cb');
        if (grpCb) { e.stopPropagation(); toggleGroupSelect(grpCb.dataset.group, grpCb.checked); return; }
        if (e.target.closest('.cr-all')) { toggleAll(); return; }
        const header = e.target.closest('.group-header');
        if (header) { toggleDeviceGroup(header); return; }
        const item = e.target.closest('.device-item');
        if (item) { toggleDevice(item.dataset.host); return; }
    });
});

// ---------------- left: targets ----------------
async function loadDevices() {
    try {
        const r = await fetch('/fabric-api.sh?action=list-devices', {cache:'no-store'});
        const data = await r.json();
        if (!data.success || !data.devices) throw new Error(data.error || 'Failed to load devices');
        devicesByGroup = {};
        groupOrder = Object.keys(data.devices);
        allHostnames = [];
        for (const [group, list] of Object.entries(data.devices)) {
            const names = list.map(d => d.hostname).filter(Boolean).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
            if (!names.length) continue;
            devicesByGroup[group] = names;
            names.forEach(n => allHostnames.push(n));
        }
        renderTargetList();
        document.getElementById('deviceCount').textContent = `${allHostnames.length} devices`;
    } catch (e) {
        document.getElementById('targetList').innerHTML = `<div style="padding:16px;color:#ef5350;">${esc(e.message)}</div>`;
        document.getElementById('deviceCount').textContent = '';
    }
}

function renderTargetList(filter = '') {
    const f = filter.toLowerCase();
    const cont = document.getElementById('targetList');
    let html = `
        <div class="cr-all">
            <input type="checkbox" id="cb-all" style="pointer-events:none;">
            <span class="cr-all-icon">&#9733;</span>
            <span class="cr-all-label">All devices</span>
            <span class="cr-all-sub" id="allSub">${allHostnames.length}</span>
        </div>`;

    groupOrder.forEach(group => {
        const names = (devicesByGroup[group] || []).filter(n => n.toLowerCase().includes(f));
        if (!names.length) return;
        html += `
            <div class="device-group">
                <div class="group-header collapsed">
                    <input type="checkbox" class="grp-cb" data-group="${esc(group)}">
                    <span class="arrow">&#9654;</span> ${esc(group)} (${names.length})
                </div>
                <div class="group-devices collapsed">
                    ${names.map(n => `
                        <div class="device-item" data-host="${esc(n)}">
                            <input type="checkbox" class="dev-cb" data-host="${esc(n)}" style="pointer-events:none;">
                            <span class="device-icon"></span><span>${esc(n)}</span>
                        </div>`).join('')}
                </div>
            </div>`;
    });
    cont.innerHTML = html;
    updateSelectionUI();
}

function filterDevices() { renderTargetList(document.getElementById('deviceSearch').value); }

// Current search term + the device lists that are actually SHOWN (so bulk toggles match the display).
function searchTerm() { const el = document.getElementById('deviceSearch'); return (el ? el.value : '').toLowerCase(); }
function groupFilteredNames(group) { const f = searchTerm(); return (devicesByGroup[group] || []).filter(n => n.toLowerCase().includes(f)); }
function allFilteredNames() { const f = searchTerm(); return f ? allHostnames.filter(n => n.toLowerCase().includes(f)) : allHostnames.slice(); }

// Prefill from Ask AI's "Run in Commands" button: ?devices=a,b&cmd=...  (selects + fills,
// but NEVER auto-runs — the operator must review and click Run).
function applyPrefillFromURL() {
    let params;
    try { params = new URLSearchParams(window.location.search); } catch (e) { return; }
    const devs = (params.get('devices') || '').split(',').map(s => s.trim()).filter(Boolean);
    const cmd = params.get('cmd') || '';
    let matched = 0;
    devs.forEach(d => {
        const host = allHostnames.find(h => h.toLowerCase() === d.toLowerCase());
        if (host) { selected.add(host); expandToDevice(host); matched++; return; }
        const grp = Object.keys(devicesByGroup).find(g => g.toLowerCase() === d.toLowerCase());
        if (grp) { (devicesByGroup[grp] || []).forEach(h => selected.add(h)); matched++; }
    });
    if (matched) updateSelectionUI();
    if (cmd) {
        const box = document.getElementById('customCmd');
        if (box) { box.value = cmd; box.focus(); }
    }
    if (matched || cmd) {
        const banner = document.getElementById('targetBanner');
        if (banner) banner.innerHTML = 'Prefilled from Ask AI — review the command and selected ' +
            `device${matched === 1 ? '' : 's'}, then click <strong>Run</strong>.`;
    }
    // Drop the query string so a refresh won't re-apply it or leak the command in history.
    try { history.replaceState(null, '', window.location.pathname); } catch (e) {}
}

function expandToDevice(host) {
    for (const item of document.querySelectorAll('.device-item')) {
        if (item.getAttribute('data-host') === host) {
            const devs = item.closest('.group-devices');
            if (devs) devs.classList.remove('collapsed');
            const grp = devs ? devs.previousElementSibling : null;
            if (grp && grp.classList.contains('group-header')) grp.classList.remove('collapsed');
            break;
        }
    }
}

function toggleDeviceGroup(header) {
    header.classList.toggle('collapsed');
    const gd = header.nextElementSibling;
    if (gd) gd.classList.toggle('collapsed');
}

function toggleAll() {
    const names = allFilteredNames();
    const allSel = names.length > 0 && names.every(h => selected.has(h));
    names.forEach(h => { if (allSel) selected.delete(h); else selected.add(h); });
    updateSelectionUI();
}

function toggleGroupSelect(group, check) {
    groupFilteredNames(group).forEach(h => { if (check) selected.add(h); else selected.delete(h); });
    updateSelectionUI();
}

function toggleDevice(name) {
    if (selected.has(name)) selected.delete(name); else selected.add(name);
    updateSelectionUI();
}

// Reflect the `selected` set onto checkboxes + banner WITHOUT re-rendering the tree
// (preserves collapse state + scroll position).
function updateSelectionUI() {
    const total = allHostnames.length;
    const n = selected.size;

    // "All" + group checkboxes reflect only the CURRENTLY FILTERED (shown) devices.
    const fAll = allFilteredNames();
    const fSel = fAll.filter(h => selected.has(h)).length;
    const cbAll = document.getElementById('cb-all');
    if (cbAll) { cbAll.checked = fSel > 0 && fSel === fAll.length; cbAll.indeterminate = fSel > 0 && fSel < fAll.length; }
    document.querySelector('.cr-all')?.classList.toggle('selected', fSel > 0 && fSel === fAll.length);

    document.querySelectorAll('.grp-cb').forEach(cb => {
        const names = groupFilteredNames(cb.getAttribute('data-group'));
        const sel = names.filter(x => selected.has(x)).length;
        cb.checked = sel > 0 && sel === names.length;
        cb.indeterminate = sel > 0 && sel < names.length;
    });

    document.querySelectorAll('.device-item').forEach(it => {
        const host = it.getAttribute('data-host');
        const on = selected.has(host);
        it.classList.toggle('selected', on);
        const cb = it.querySelector('.dev-cb');
        if (cb) cb.checked = on;
    });

    const banner = document.getElementById('targetBanner');
    if (n === 0) {
        banner.innerHTML = 'Select one or more devices on the left (checkboxes), then run a command.';
    } else {
        const names = [...selected];
        const preview = names.slice(0, 4).join(', ') + (names.length > 4 ? ` +${names.length - 4} more` : '');
        banner.innerHTML = `Target: <strong>${n}</strong> selected &mdash; <span style="color:#9a9a9a;">${esc(preview)}</span>`;
    }
    const dc = document.getElementById('deviceCount');
    if (dc) dc.textContent = `${n} selected / ${total} devices`;
}

// ---------------- command groups ----------------
function renderGroupsBar() {
    document.getElementById('groupsBar').innerHTML = CMD_GROUPS.map((g,i) =>
        `<div class="cr-chip" id="chip-${i}" style="color:${g.color};" onclick="showGroup(${i})">
            <span class="dot" style="background:${g.color};"></span><span style="color:#d4d4d4;">${esc(g.title)}</span>
        </div>`).join('');
}

function showGroup(i) {
    document.querySelectorAll('.cr-chip').forEach(c => c.classList.remove('active'));
    const chip = document.getElementById('chip-' + i);
    if (chip) chip.classList.add('active');
    // data-cmd (not inline onclick) so commands with quotes (vtysh -c '...') are safe
    document.getElementById('groupPanel').innerHTML = CMD_GROUPS[i].cmds
        .map(c => `<button class="cmd-btn" data-cmd="${esc(c)}">${esc(c)}</button>`).join('');
}

function runCustomCommand() {
    const cmd = document.getElementById('customCmd').value.trim();
    if (cmd) runOnTarget(cmd);
}

// ---------------- execution (fan-out) ----------------
// Index-based ids: sanitizing hostnames (e.g. leaf.1 / leaf:1) would collide, so map each
// host of the current run to a unique index instead.
let cardIndex = {};
function cardId(host) { return 'res-' + (host in cardIndex ? cardIndex[host] : 0); }

async function runOnTarget(cmd) {
    if (running) return;
    const hosts = [...selected].sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
    if (!hosts.length) {
        document.getElementById('targetBanner').innerHTML =
            '<span style="color:#ef5350;">Select one or more devices on the left (checkboxes) first.</span>';
        return;
    }

    // No confirmation prompt — run directly on the selected targets.
    running = true;
    cancelled = false;
    controllers = new Set();
    document.getElementById('runBtn').disabled = true;
    const stopBtn = document.getElementById('stopBtn');
    if (stopBtn) stopBtn.style.display = '';
    const single = hosts.length === 1;
    const state = {}; hosts.forEach(h => state[h] = {status:'running', output:'Running…'});
    renderResults(cmd, hosts, state, single);

    let idx = 0;
    const worker = async () => {
        while (idx < hosts.length) {
            if (cancelled) return;
            await runOne(hosts[idx++], cmd, hosts, state, single);
        }
    };
    await Promise.all(Array.from({length: Math.min(POOL, hosts.length)}, worker));

    if (cancelled) {
        hosts.forEach(h => { if (state[h].status === 'running') { state[h] = {status:'fail', output:'Cancelled'}; updateCard(h, state[h], single); } });
        updateSummary(hosts, state, cmd);
    }
    running = false;
    controllers.clear();
    document.getElementById('runBtn').disabled = false;
    if (stopBtn) stopBtn.style.display = 'none';
}

// Run one device, retrying with backoff when the backend reports device_busy (flock contention).
async function runOne(h, cmd, hosts, state, single) {
    const toMs = cmdTimeoutMs(cmd);
    const secs = Math.round(toMs / 1000);
    for (let attempt = 1; attempt <= MAX_TRIES; attempt++) {
        if (cancelled) { state[h] = {status:'fail', output:'Cancelled'}; break; }
        const ctrl = new AbortController();
        controllers.add(ctrl);
        const to = setTimeout(() => ctrl.abort(), toMs);
        let retry = false;
        try {
            const r = await fetch('/fabric-api.sh?action=run-device-command', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({device:h, command:cmd}), signal: ctrl.signal,
            });
            const d = await r.json();
            if (d.success) {
                state[h] = {status:'ok', output:(d.output || '(no output)')};
            } else if (d.error_code === 'device_busy' && attempt < MAX_TRIES && !cancelled) {
                retry = true;
                state[h] = {status:'running', output:`Device busy — retrying (${attempt}/${MAX_TRIES - 1})…`};
                updateCard(h, state[h], single);
            } else {
                state[h] = {status:'fail', output: failOutput(d)};
            }
        } catch (e) {
            state[h] = {status:'fail', output: (cancelled || e.name === 'AbortError')
                ? (cancelled ? 'Cancelled' : `Timed out (${secs}s)`)
                : ('Request failed: ' + e.message)};
        } finally {
            clearTimeout(to);
            controllers.delete(ctrl);
        }
        if (retry) { await backoff(attempt); continue; }
        break;
    }
    updateCard(h, state[h], single);
    updateSummary(hosts, state, cmd);
}

function backoff(attempt) { return new Promise(r => setTimeout(r, 400 * attempt)); }

// Abort all pending/in-flight requests; remaining devices are marked cancelled by runOnTarget.
function stopRun() {
    if (!running) return;
    cancelled = true;
    controllers.forEach(c => { try { c.abort(); } catch (e) {} });
    controllers.clear();
}

// On failure show the FULL captured output (stdout + stderr) with the error as the first line,
// instead of dropping everything but the truncated error string.
function failOutput(d) {
    let body = '';
    if (d.output) body += d.output;
    if (d.error_output) body += (body ? '\n' : '') + d.error_output;
    const err = d.error || 'unknown error';
    return body ? (err + '\n\n' + body) : ('Error: ' + err);
}

function renderResults(cmd, hosts, state, single) {
    const res = document.getElementById('results');
    cardIndex = {}; hosts.forEach((h, i) => cardIndex[h] = i);
    let html = `<div class="cr-summary" id="resSummary"></div>`;
    html += hosts.map(h => {
        const st = state[h];
        const open = single ? 'open' : '';
        return `<div class="rescard ${open}" id="${cardId(h)}">
            <div class="rescard-head" onclick="this.parentElement.classList.toggle('open')">
                <span class="badge badge-${st.status}">${st.status}</span>
                <span class="rescard-host">${esc(h)}</span>
                <span class="rescard-arrow">&#9654;</span>
            </div>
            <pre class="rescard-out">${ansiToHtml(st.output)}</pre>
        </div>`;
    }).join('');
    res.innerHTML = html;
    updateSummary(hosts, state, cmd);
}

function updateCard(host, st, single) {
    const card = document.getElementById(cardId(host));
    if (!card) return;
    card.querySelector('.badge').className = 'badge badge-' + st.status;
    card.querySelector('.badge').textContent = st.status;
    card.querySelector('.rescard-out').innerHTML = ansiToHtml(st.output);
    // auto-expand failures (single-device runs are already open)
    if (!single && st.status === 'fail') card.classList.add('open');
}

function updateSummary(hosts, state, cmd) {
    const el = document.getElementById('resSummary');
    if (!el) return;
    let ok=0, fail=0, run=0;
    hosts.forEach(h => { const s = state[h].status; if (s==='ok') ok++; else if (s==='fail') fail++; else run++; });
    el.innerHTML = `<span class="s-cmd">$ ${esc(cmd)}</span>
        <span>Targets: <span class="s-val">${hosts.length}</span></span>
        <span class="s-ok">OK: ${ok}</span>
        <span class="s-fail">Failed: ${fail}</span>
        ${run ? `<span>Running: ${run}</span>` : ''}`;
}

// ---------------- helpers ----------------
function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Convert ANSI SGR color codes (e.g. from nvt) to safe HTML.
// Text is HTML-escaped; only fixed-palette / numeric-rgb color spans are injected.
function ansiToHtml(input) {
    const BASIC = {
        30:'#3b3b3b',31:'#ef5350',32:'#81c784',33:'#ffd54f',34:'#64b5f6',35:'#ba68c8',36:'#4dd0e1',37:'#e0e0e0',
        90:'#777',91:'#ef9a9a',92:'#a5d6a7',93:'#fff59d',94:'#90caf9',95:'#ce93d8',96:'#80deea',97:'#ffffff'
    };
    const s = String(input ?? '').replace(/\r/g, '');
    let out = '', open = false, fg = null, bold = false;
    const close = () => { if (open) { out += '</span>'; open = false; } };
    const apply = () => {
        close();
        let st = '';
        if (fg) st += 'color:' + fg + ';';
        if (bold) st += 'font-weight:bold;';
        if (st) { out += '<span style="' + st + '">'; open = true; }
    };
    const parts = s.split(/\x1b\[([0-9;]*)m/);
    for (let i = 0; i < parts.length; i++) {
        if (i % 2 === 0) { out += esc(parts[i]); continue; }
        const codes = parts[i].split(';').map(n => n === '' ? 0 : parseInt(n, 10));
        for (let k = 0; k < codes.length; k++) {
            const c = codes[k];
            if (c === 0) { fg = null; bold = false; }
            else if (c === 1) bold = true;
            else if (c === 22) bold = false;
            else if (c === 39) fg = null;
            else if (c === 38 && codes[k + 1] === 2) { fg = `rgb(${codes[k + 2] || 0},${codes[k + 3] || 0},${codes[k + 4] || 0})`; k += 4; }
            else if (c === 38 && codes[k + 1] === 5) { k += 2; }
            else if (BASIC[c]) fg = BASIC[c];
        }
        apply();
    }
    close();
    return out;
}
</script>
