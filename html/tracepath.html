<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>..::LLDPQ::..</title>
    <link rel="shortcut icon" href="/png/favicon.ico">
    <script src="/css/auth.js"></script>
    <style>
        /* Prevent browser autofill from changing input background */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #1a1a1a inset !important;
            -webkit-text-fill-color: #fff !important;
            caret-color: #fff !important;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            min-height: 100vh;
        }
        
        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #404040;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #76b900;
        }
        
        .device-count {
            font-size: 13px;
            color: #888;
        }
        
        .device-count span {
            color: #76b900;
            font-weight: 600;
        }
        
        /* Search Container */
        .trace-container {
            margin-bottom: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            border-radius: 8px;
            border: 1px solid #404040;
        }
        
        .trace-form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .trace-form input {
            padding: 12px 16px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 15px;
            min-width: 200px;
        }
        
        .trace-form input:focus {
            outline: none;
            border-color: #76b900;
        }
        
        .trace-form input::placeholder {
            color: #666;
        }
        
        .trace-form select {
            padding: 12px 16px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 15px;
            min-width: 150px;
        }
        
        .trace-form select:focus {
            outline: none;
            border-color: #76b900;
        }
        
        .btn-trace {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #76b900;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .btn-trace:hover {
            background: #8ed600;
            transform: translateY(-1px);
        }
        
        .btn-trace:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-clear {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background: #3a3a3a;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn-clear:hover {
            background: #4a4a4a;
            color: #fff;
        }
        
        .arrow-icon {
            font-size: 20px;
            color: #76b900;
            font-weight: bold;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .spin {
            animation: spin 1s linear infinite;
        }
        
        /* Results Section */
        .results-section {
            background: #2d2d2d;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #333;
            border-bottom: 1px solid #404040;
        }
        
        .results-title {
            font-size: 16px;
            font-weight: 600;
            color: #76b900;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .results-title svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        
        .results-info {
            font-size: 13px;
            color: #888;
        }
        
        .results-content {
            padding: 20px;
            min-height: 200px;
        }
        
        .placeholder-text {
            text-align: center;
            color: #666;
            padding: 60px 20px;
            font-size: 14px;
        }
        
        /* Path Visualization */
        .path-container {
            display: flex;
            flex-direction: column;
            gap: 0;
            padding-left: 20px;
        }
        
        .path-hop {
            display: flex;
            align-items: stretch;
            gap: 0;
            transition: margin-left 0.3s ease;
        }
        
        .hop-line {
            width: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .hop-dot {
            width: 14px;
            height: 14px;
            background: #76b900;
            border-radius: 50%;
            border: 2px solid #2d2d2d;
            box-shadow: 0 0 6px rgba(118, 185, 0, 0.4);
            z-index: 1;
            flex-shrink: 0;
        }
        
        .hop-dot.source {
            background: #4fc3f7;
            box-shadow: 0 0 6px rgba(79, 195, 247, 0.4);
        }
        
        .hop-dot.destination {
            background: #26c6da;
            box-shadow: 0 0 6px rgba(38, 198, 218, 0.4);
        }
        
        .hop-dot.ecmp {
            background: #ffa726;
            box-shadow: 0 0 6px rgba(255, 167, 38, 0.4);
        }
        
        .hop-dot.core {
            background: #42a5f5;
            box-shadow: 0 0 6px rgba(66, 165, 245, 0.4);
        }
        
        .hop-dot.external {
            background: #ff7043;
            box-shadow: 0 0 8px rgba(255, 112, 67, 0.5);
        }
        
        .hop-dot.border {
            background: #ab47bc;
            box-shadow: 0 0 6px rgba(171, 71, 188, 0.4);
        }
        
        .hop-dot.endpoint {
            background: #666;
            width: 10px;
            height: 10px;
            box-shadow: none;
            border: 2px solid #444;
        }
        
        .hop-connector {
            width: 2px;
            flex: 1;
            background: linear-gradient(to bottom, #555, #444);
            min-height: 20px;
            opacity: 0.6;
        }
        
        .hop-card {
            flex: 1;
            background: #3a3a3a;
            border: 1px solid #4a4a4a;
            border-radius: 6px;
            padding: 12px 16px;
            margin: 4px 0;
            transition: all 0.2s;
        }
        
        .hop-card:hover {
            border-color: #76b900;
            background: #404040;
        }
        
        .hop-card.source {
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }
        
        .hop-card.destination {
            border-color: #26c6da;
            background: rgba(38, 198, 218, 0.1);
        }
        
        .hop-card.endpoint {
            border-color: #666;
            background: #333;
            padding: 8px 16px;
        }
        
        .hop-card.endpoint .hop-device {
            color: #aaa;
            font-size: 14px;
        }
        
        .hop-card.ecmp {
            border-color: #ffa726;
            background: rgba(255, 167, 38, 0.08);
        }
        
        .hop-card.core {
            border-color: #42a5f5;
            background: rgba(66, 165, 245, 0.08);
        }
        
        .hop-card.external {
            border-color: #ff7043;
            background: rgba(255, 112, 67, 0.1);
            border-style: dashed;
        }
        
        .hop-card.border {
            border-color: #ab47bc;
            background: rgba(171, 71, 188, 0.1);
        }
        
        .ecmp-devices {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        
        .ecmp-device-tag {
            display: inline-block;
            padding: 3px 10px;
            background: #4a4a4a;
            border-radius: 4px;
            font-size: 12px;
            color: #ffa726;
            font-family: 'Consolas', monospace;
        }
        
        .core .ecmp-device-tag {
            color: #42a5f5;
        }
        
        .hop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .hop-device {
            font-size: 15px;
            font-weight: 600;
            color: #76b900;
        }
        
        .hop-number {
            font-size: 12px;
            color: #888;
            background: #2d2d2d;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .hop-details {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 13px;
        }
        
        .hop-detail {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .hop-detail-label {
            color: #888;
        }
        
        .hop-detail-value {
            color: #d4d4d4;
            font-family: 'Consolas', monospace;
        }
        
        .hop-detail-value.interface {
            color: #4fc3f7;
        }
        
        .hop-detail-value.nexthop {
            color: #ffa726;
        }
        
        /* Summary Stats */
        .path-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #333;
            border-radius: 6px;
            flex-wrap: wrap;
        }
        
        .summary-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .summary-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        
        .summary-value {
            font-size: 18px;
            font-weight: 600;
            color: #76b900;
        }
        
        .summary-value.hops {
            color: #4fc3f7;
        }
        
        /* Error State */
        .error-message {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            border-radius: 6px;
            padding: 16px;
            color: #f44336;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .error-message svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            flex-shrink: 0;
        }
        
        /* No Path Found */
        .no-path {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .no-path svg {
            width: 48px;
            height: 48px;
            fill: #555;
            margin-bottom: 16px;
        }
        
        .no-path h3 {
            color: #d4d4d4;
            margin-bottom: 8px;
        }
        
        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 60px;
            color: #888;
        }
        
        .loading svg {
            width: 40px;
            height: 40px;
            fill: #76b900;
            animation: spin 1s linear infinite;
        }
        
        /* VRF Badge */
        .vrf-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #4a4a4a;
            border-radius: 4px;
            font-size: 11px;
            color: #aaa;
            margin-left: 8px;
        }
    </style>

<body>
    <div class="page-header">
        <div class="page-title" role="heading" aria-level="1">Tracepath</div>
        <div class="device-count"><span id="deviceCount" aria-live="polite">-</span> devices available</div>
    </div>
    
    <div class="trace-container">
        <div class="trace-form" role="search" aria-label="Network path trace">
            <input type="text" id="sourceIp" placeholder="Source IP" aria-label="Source IP address" inputmode="decimal" autocomplete="off" spellcheck="false" />
            <select id="srcVrfSelect" aria-label="Source VRF">
                <option value="">VRF: auto</option>
            </select>
            <span class="arrow-icon" role="button" tabindex="0" aria-label="Swap source and destination" onclick="swapSrcDst()" onkeydown="handleSwapKey(event)" title="Swap source and destination" style="cursor:pointer;user-select:none;">⇄</span>
            <input type="text" id="destinationIp" placeholder="Destination IP" aria-label="Destination IP address" inputmode="decimal" autocomplete="off" spellcheck="false" />
            <select id="dstVrfSelect" aria-label="Destination VRF">
                <option value="">VRF: auto</option>
            </select>
            <button type="button" class="btn-trace" id="traceBtn" onclick="tracePath()">
                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/></svg>
                Trace
            </button>
            <button type="button" class="btn-clear" onclick="clearResults()">Clear</button>
        </div>
    </div>
    
    <div class="results-section" role="region" aria-labelledby="resultsTitle">
        <div class="results-header">
            <div class="results-title" id="resultsTitle">
                <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
                Path Results
            </div>
            <div class="results-info" id="resultsInfo" aria-live="polite"></div>
        </div>
        <div class="results-content" id="resultsContent" aria-live="polite" aria-busy="false">
            <div class="placeholder-text">
                Enter source and destination IP addresses and click Trace to discover the network path
            </div>
        </div>
    </div>
    
    <script>
        const TRACE_TIMEOUT_MS = 30000;
        const LOOKUP_TIMEOUT_MS = 10000;
        const TRACE_BUTTON_HTML = `<svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/></svg> Trace`;

        // All known VRFs (loaded once, used for destination VRF dropdown)
        let allKnownVrfs = [];
        let srcDetectTimeout = null;
        let srcVrfRequestController = null;
        let srcVrfRequestId = 0;
        let dstDetectTimeout = null;
        let dstVrfRequestController = null;
        let dstVrfRequestId = 0;
        let traceController = null;
        let traceRequestId = 0;

        function toText(value) {
            return value === null || value === undefined ? '' : String(value);
        }

        // Every value interpolated into result markup passes through this helper.
        function escapeHtml(value) {
            return toText(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function isValidIpv4(value) {
            const octets = toText(value).split('.');
            return octets.length === 4 && octets.every(octet =>
                /^\d{1,3}$/.test(octet) &&
                (octet === '0' || !octet.startsWith('0')) &&
                Number(octet) >= 0 && Number(octet) <= 255
            );
        }

        function normalizeVrfList(vrfs) {
            if (!Array.isArray(vrfs)) return [];
            return [...new Set(vrfs
                .filter(vrf => typeof vrf === 'string')
                .map(vrf => vrf.trim())
                .filter(Boolean))];
        }

        function setVrfOptions(select, vrfs, selectedValue = '', includeSelected = false) {
            const selected = toText(selectedValue).trim();
            const values = normalizeVrfList(vrfs);
            if (includeSelected && selected && !values.includes(selected)) {
                values.unshift(selected);
            }

            const options = [];
            const autoOption = document.createElement('option');
            autoOption.value = '';
            autoOption.textContent = 'VRF: auto';
            options.push(autoOption);

            values.forEach(vrf => {
                const option = document.createElement('option');
                option.value = vrf;
                option.textContent = vrf;
                options.push(option);
            });

            select.replaceChildren(...options);
            select.value = selected && values.includes(selected) ? selected : '';
        }

        // Sync destination VRF while preserving an explicit user choice by default.
        function syncDstVrf(options = {}) {
            const srcVrf = document.getElementById('srcVrfSelect').value;
            const dstSelect = document.getElementById('dstVrfSelect');
            const previous = dstSelect.value;
            const hasPreferred = Object.prototype.hasOwnProperty.call(options, 'preferredVrf');
            const preferred = hasPreferred ? toText(options.preferredVrf).trim() : '';
            const preservePrevious = options.preservePrevious !== false;

            const vrfSet = new Set(normalizeVrfList(allKnownVrfs));
            if (srcVrf) vrfSet.add(srcVrf);
            if (previous) vrfSet.add(previous);
            if (preferred) vrfSet.add(preferred);

            const vrfList = [...vrfSet].sort((a, b) => {
                if (a === srcVrf) return -1;
                if (b === srcVrf) return 1;
                if (a === 'mgmt') return 1;
                if (b === 'mgmt') return -1;
                return a.localeCompare(b);
            });

            let selected = '';
            if (hasPreferred) {
                selected = preferred;
            } else if (preservePrevious && previous) {
                selected = previous;
            } else if (srcVrf) {
                selected = srcVrf;
            }

            setVrfOptions(dstSelect, vrfList, selected, true);
        }

        function cancelSrcVrfDetection() {
            if (srcDetectTimeout !== null) {
                clearTimeout(srcDetectTimeout);
                srcDetectTimeout = null;
            }
            srcVrfRequestId += 1;
            if (srcVrfRequestController) {
                srcVrfRequestController.abort();
                srcVrfRequestController = null;
            }
            document.getElementById('srcVrfSelect').setAttribute('aria-busy', 'false');
        }

        function cancelDstVrfDetection() {
            if (dstDetectTimeout !== null) {
                clearTimeout(dstDetectTimeout);
                dstDetectTimeout = null;
            }
            dstVrfRequestId += 1;
            if (dstVrfRequestController) {
                dstVrfRequestController.abort();
                dstVrfRequestController = null;
            }
            document.getElementById('dstVrfSelect').setAttribute('aria-busy', 'false');
        }

        // Swap source and destination (IP + VRF)
        function swapSrcDst() {
            if (traceController) {
                cancelTraceRequest();
                resetResultsDisplay();
            }
            const srcIp = document.getElementById('sourceIp');
            const dstIp = document.getElementById('destinationIp');
            const srcVrf = document.getElementById('srcVrfSelect');
            const dstVrf = document.getElementById('dstVrfSelect');

            const oldSourceIp = srcIp.value;
            const oldDestinationIp = dstIp.value;
            const oldSourceVrf = srcVrf.value;
            // Destination "auto" has the effective meaning of the source VRF.
            const oldDestinationVrf = dstVrf.value || oldSourceVrf;

            cancelSrcVrfDetection();
            cancelDstVrfDetection();
            srcIp.value = oldDestinationIp;
            dstIp.value = oldSourceIp;

            setVrfOptions(srcVrf, oldDestinationVrf ? [oldDestinationVrf] : [], oldDestinationVrf, true);
            syncDstVrf({ preferredVrf: oldSourceVrf, preservePrevious: false });

            // Refresh available VRFs for the new source without losing the swapped choice.
            detectSrcVrfs(oldDestinationVrf, true);
        }

        function handleSwapKey(event) {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                swapSrcDst();
            }
        }
        
        async function fetchJsonWithTimeout(url, timeoutMs = LOOKUP_TIMEOUT_MS) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(url, { signal: controller.signal });
                return await parseJsonResponse(response);
            } finally {
                clearTimeout(timeoutId);
            }
        }
        
        async function loadDeviceCount() {
            const countElement = document.getElementById('deviceCount');
            const countContainer = countElement.parentElement;
            const safeCount = value => {
                const number = Number(value);
                return Number.isFinite(number) ? Math.max(0, Math.trunc(number)) : 0;
            };

            // Prefer scan coverage: stale cache is still usable, unavailable is not.
            try {
                const data = await fetchJsonWithTimeout('/search-api.sh?action=scan-status');
                const hasCurrent = Object.prototype.hasOwnProperty.call(data, 'current_count');
                const hasStale = Object.prototype.hasOwnProperty.call(data, 'stale_count');
                if (data.success === false || !hasCurrent || !hasStale) {
                    throw new Error('Scan status counts are unavailable');
                }

                const current = safeCount(data.current_count);
                const stale = safeCount(data.stale_count);
                const unavailable = safeCount(data.unavailable_count);
                countElement.textContent = current + stale;
                countContainer.title = `Current: ${current} • Stale: ${stale} • Unavailable: ${unavailable}`;
                return;
            } catch (scanStatusError) {
                // Older deployments may not expose scan-status; retain the inventory fallback.
            }

            try {
                const data = await fetchJsonWithTimeout('/search-api.sh?action=list-devices');
                if (Array.isArray(data.devices)) {
                    countElement.textContent = data.devices.length;
                    countContainer.title = 'Inventory count (scan status unavailable)';
                }
            } catch (error) {
                console.error('Error loading device count:', error);
            }
        }
        
        // Load all VRFs from backend
        async function loadAllVrfs() {
            try {
                const response = await fetch('/search-api.sh?action=get-vrfs');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                allKnownVrfs = normalizeVrfList(data.vrfs);
                syncDstVrf();
            } catch(e) {}
        }
        
        // Auto-detect VRFs for source IP
        async function detectSrcVrfs(preferredVrf, preservePreferred = false) {
            if (srcDetectTimeout !== null) {
                clearTimeout(srcDetectTimeout);
                srcDetectTimeout = null;
            }
            if (srcVrfRequestController) {
                srcVrfRequestController.abort();
                srcVrfRequestController = null;
            }

            const ip = document.getElementById('sourceIp').value.trim();
            const sel = document.getElementById('srcVrfSelect');
            sel.setAttribute('aria-busy', 'false');
            const selectionAtStart = sel.value;
            const requestedSelection = preferredVrf === undefined
                ? selectionAtStart
                : toText(preferredVrf).trim();
            const requestId = ++srcVrfRequestId;

            if (!ip || !isValidIpv4(ip)) {
                const fallback = preservePreferred ? requestedSelection : '';
                setVrfOptions(sel, fallback ? [fallback] : [], fallback, true);
                syncDstVrf();
                return;
            }

            const controller = new AbortController();
            srcVrfRequestController = controller;
            sel.setAttribute('aria-busy', 'true');
            let didTimeout = false;
            const timeoutId = setTimeout(() => {
                didTimeout = true;
                controller.abort();
            }, LOOKUP_TIMEOUT_MS);

            try {
                const response = await fetch(
                    `/search-api.sh?action=find-ip-vrf&ip=${encodeURIComponent(ip)}`,
                    { signal: controller.signal }
                );
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (requestId !== srcVrfRequestId || controller.signal.aborted ||
                    document.getElementById('sourceIp').value.trim() !== ip) return;

                const vrfs = normalizeVrfList(data.vrfs);
                if (preservePreferred && requestedSelection && !vrfs.includes(requestedSelection)) {
                    vrfs.unshift(requestedSelection);
                }

                // A manual change made while the lookup was running wins.
                const currentSelection = sel.value;
                const candidate = currentSelection !== selectionAtStart
                    ? currentSelection
                    : requestedSelection;
                const selected = candidate && vrfs.includes(candidate)
                    ? candidate
                    : (vrfs[0] || '');
                setVrfOptions(sel, vrfs, selected, preservePreferred);
                syncDstVrf();
            } catch(e) {
                if (requestId !== srcVrfRequestId || (controller.signal.aborted && !didTimeout)) return;
                if (didTimeout) console.error('Source VRF lookup timed out');
                const fallback = preservePreferred ? requestedSelection : '';
                setVrfOptions(sel, fallback ? [fallback] : [], fallback, true);
                syncDstVrf();
            } finally {
                clearTimeout(timeoutId);
                if (requestId === srcVrfRequestId) {
                    srcVrfRequestController = null;
                    sel.setAttribute('aria-busy', 'false');
                }
            }
        }
        
        // Auto-detect VRFs for destination IP (same flow as the source field;
        // a manual destination VRF choice always wins over the detection).
        async function detectDstVrfs() {
            if (dstDetectTimeout !== null) {
                clearTimeout(dstDetectTimeout);
                dstDetectTimeout = null;
            }
            if (dstVrfRequestController) {
                dstVrfRequestController.abort();
                dstVrfRequestController = null;
            }

            const ip = document.getElementById('destinationIp').value.trim();
            const sel = document.getElementById('dstVrfSelect');
            sel.setAttribute('aria-busy', 'false');
            const selectionAtStart = sel.value;
            const requestId = ++dstVrfRequestId;

            if (!ip || !isValidIpv4(ip)) {
                return;
            }

            const controller = new AbortController();
            dstVrfRequestController = controller;
            sel.setAttribute('aria-busy', 'true');
            let didTimeout = false;
            const timeoutId = setTimeout(() => {
                didTimeout = true;
                controller.abort();
            }, LOOKUP_TIMEOUT_MS);

            try {
                const response = await fetch(
                    `/search-api.sh?action=find-ip-vrf&ip=${encodeURIComponent(ip)}`,
                    { signal: controller.signal }
                );
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (requestId !== dstVrfRequestId || controller.signal.aborted ||
                    document.getElementById('destinationIp').value.trim() !== ip) return;

                // A manual change made while the lookup was running wins.
                if (sel.value !== selectionAtStart) return;

                const vrfs = normalizeVrfList(data.vrfs);
                if (vrfs.length > 0) {
                    syncDstVrf({ preferredVrf: vrfs[0], preservePrevious: false });
                }
            } catch(e) {
                if (requestId !== dstVrfRequestId || (controller.signal.aborted && !didTimeout)) return;
                if (didTimeout) console.error('Destination VRF lookup timed out');
            } finally {
                clearTimeout(timeoutId);
                if (requestId === dstVrfRequestId) {
                    dstVrfRequestController = null;
                    sel.setAttribute('aria-busy', 'false');
                }
            }
        }

        // Debounced auto-detect for source IP
        document.getElementById('sourceIp').addEventListener('input', function() {
            cancelActiveTraceForChangedInput();
            cancelSrcVrfDetection();
            // Never carry a detected VRF from the previous source address.
            setVrfOptions(document.getElementById('srcVrfSelect'), [], '');
            syncDstVrf();
            srcDetectTimeout = setTimeout(detectSrcVrfs, 500);
        });
        document.getElementById('sourceIp').addEventListener('blur', function() {
            if (srcDetectTimeout !== null) clearTimeout(srcDetectTimeout);
            srcDetectTimeout = null;
            detectSrcVrfs();
        });
        
        // Source VRF changed manually → sync dest VRF
        document.getElementById('srcVrfSelect').addEventListener('change', function() {
            cancelActiveTraceForChangedInput();
            cancelSrcVrfDetection();
            syncDstVrf();
        });
        // Destination VRF changed manually → a pending detection must not
        // override the explicit choice.
        document.getElementById('dstVrfSelect').addEventListener('change', function() {
            cancelActiveTraceForChangedInput();
            cancelDstVrfDetection();
        });
        
        // Prefill the form from URL query parameters (source_ip, dest_ip,
        // vrf, dst_vrf) and auto-run the trace when both endpoints are given.
        function applyUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const sourceIp = (params.get('source_ip') || '').trim();
            const destIp = (params.get('dest_ip') || '').trim();
            const vrf = (params.get('vrf') || '').trim();
            const dstVrf = (params.get('dst_vrf') || '').trim();
            if (!sourceIp && !destIp && !vrf && !dstVrf) return;

            if (sourceIp) document.getElementById('sourceIp').value = sourceIp;
            if (destIp) document.getElementById('destinationIp').value = destIp;
            if (vrf) setVrfOptions(document.getElementById('srcVrfSelect'), [vrf], vrf, true);
            if (dstVrf) syncDstVrf({ preferredVrf: dstVrf, preservePrevious: false });

            if (sourceIp && destIp && isValidIpv4(sourceIp) && isValidIpv4(destIp)) {
                tracePath();
                return;
            }
            // Partial prefill: run the same detections typing would trigger.
            if (sourceIp) detectSrcVrfs(vrf, Boolean(vrf));
            if (destIp && !dstVrf) detectDstVrfs();
        }

        function setTraceButtonLoading(isLoading) {
            const button = document.getElementById('traceBtn');
            button.disabled = isLoading;
            button.setAttribute('aria-busy', isLoading ? 'true' : 'false');
            button.innerHTML = isLoading
                ? `<svg viewBox="0 0 24 24" width="16" height="16" class="spin"><path d="M12 4V2A10 10 0 0 0 2 12h2a8 8 0 0 1 8-8z" fill="currentColor"/></svg> Tracing...`
                : TRACE_BUTTON_HTML;
        }

        function renderError(resultsContent, title, message) {
            resultsContent.innerHTML = `
                <div class="error-message" role="alert">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                    <div>
                        <strong>${escapeHtml(title)}:</strong> ${escapeHtml(message)}
                    </div>
                </div>
            `;
        }

        async function parseJsonResponse(response) {
            const text = await response.text();
            let data = null;
            try {
                data = JSON.parse(text);
            } catch (error) {
                if (response.ok) throw new Error('The server returned an invalid response');
            }

            if (!response.ok) {
                const apiMessage = data && typeof data === 'object' && data.error
                    ? toText(data.error)
                    : '';
                throw new Error(apiMessage || `Request failed (HTTP ${response.status})`);
            }
            if (!data || typeof data !== 'object' || Array.isArray(data)) {
                throw new Error('The server returned an invalid response');
            }
            return data;
        }

        function dataWarningMessages(data) {
            if (!data || !Array.isArray(data.warnings)) return [];
            return data.warnings.map(warning => {
                if (typeof warning === 'string') return warning.trim();
                if (!warning || typeof warning !== 'object') return '';
                return toText(warning.message || warning.code).trim();
            }).filter(Boolean);
        }

        function setResultsInfo(baseText, data = null) {
            const resultsInfo = document.getElementById('resultsInfo');
            const warnings = dataWarningMessages(data);
            const warningText = warnings.length > 0
                ? `⚠ ${warnings.length} data warning${warnings.length === 1 ? '' : 's'}`
                : '';
            resultsInfo.textContent = baseText && warningText
                ? `${baseText} • ${warningText}`
                : (baseText || warningText);

            const tooltipLines = [...warnings];
            if (data && data.path_basis) {
                tooltipLines.push('Path inferred from cached FIB and active LLDP data.');
            }
            if (tooltipLines.length > 0) {
                resultsInfo.title = tooltipLines.join('\n');
            } else {
                resultsInfo.removeAttribute('title');
            }
        }
        
        async function tracePath() {
            const sourceIp = document.getElementById('sourceIp').value.trim();
            const destIp = document.getElementById('destinationIp').value.trim();
            const srcVrf = document.getElementById('srcVrfSelect').value || '';
            // Dest VRF: if empty/"same", use source VRF
            const dstVrf = document.getElementById('dstVrfSelect').value || srcVrf;
            const vrf = srcVrf; // backward compat: primary VRF hint
            const btn = document.getElementById('traceBtn');
            const resultsContent = document.getElementById('resultsContent');

            // The disabled button does not prevent keyboard handlers from calling this function.
            if (traceController || btn.disabled) return;
            // Freeze the VRF selection used by this request.
            cancelSrcVrfDetection();
            cancelDstVrfDetection();
            
            if (!sourceIp) {
                showAlertModal('Please enter a source IP address');
                return;
            }
            
            if (!destIp) {
                showAlertModal('Please enter a destination IP address');
                return;
            }
            
            // Validate complete IPv4 addresses, including the 0-255 octet range.
            if (!isValidIpv4(sourceIp)) {
                showAlertModal('Please enter a valid source IP address');
                return;
            }
            if (!isValidIpv4(destIp)) {
                showAlertModal('Please enter a valid destination IP address');
                return;
            }

            const requestId = ++traceRequestId;
            const controller = new AbortController();
            traceController = controller;
            let didTimeout = false;
            const timeoutId = setTimeout(() => {
                didTimeout = true;
                controller.abort();
            }, TRACE_TIMEOUT_MS);

            // Show loading
            setTraceButtonLoading(true);
            setResultsInfo('');
            resultsContent.setAttribute('aria-busy', 'true');
            resultsContent.innerHTML = `
                <div class="loading">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4V2A10 10 0 0 0 2 12h2a8 8 0 0 1 8-8z"/></svg>
                    <span>Tracing path from ${escapeHtml(sourceIp)} to ${escapeHtml(destIp)}...</span>
                </div>
            `;

            try {
                const response = await fetch(
                    `/search-api.sh?action=trace-path-ip&source_ip=${encodeURIComponent(sourceIp)}&dest_ip=${encodeURIComponent(destIp)}&vrf=${encodeURIComponent(srcVrf)}&dst_vrf=${encodeURIComponent(dstVrf)}`,
                    { signal: controller.signal }
                );
                const data = await parseJsonResponse(response);

                if (requestId !== traceRequestId || controller.signal.aborted) return;

                if (data.error) {
                    renderError(resultsContent, 'Error', data.error);
                    setResultsInfo('', data);
                } else if (Array.isArray(data.path) && data.path.length > 0) {
                    renderPath(data, sourceIp, destIp, data.vrf || vrf);
                } else {
                    resultsContent.innerHTML = `
                        <div class="no-path">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                            <h3>No Path Found</h3>
                            <p>Could not find a route from ${escapeHtml(sourceIp)} to ${escapeHtml(destIp)}</p>
                        </div>
                    `;
                    setResultsInfo('', data);
                }
            } catch (error) {
                if (requestId !== traceRequestId || (controller.signal.aborted && !didTimeout)) return;
                const message = didTimeout
                    ? 'The trace request timed out. Please try again.'
                    : (error && error.message ? error.message : 'Unable to complete the trace request');
                renderError(resultsContent, 'Connection Error', message);
                setResultsInfo('');
            } finally {
                clearTimeout(timeoutId);
                if (requestId === traceRequestId) {
                    traceController = null;
                    resultsContent.setAttribute('aria-busy', 'false');
                    setTraceButtonLoading(false);
                }
            }
        }
        
        // Link health badge for ECMP/transit hops
        function linkHealthBadge(hop) {
            const normalizeCount = value => {
                const number = Number(value);
                return Number.isFinite(number) ? Math.max(0, Math.trunc(number)) : 0;
            };
            const up = normalizeCount(hop.links_up);
            const down = normalizeCount(hop.links_down);
            const mismatch = normalizeCount(hop.links_mismatch);
            const total = up + down;
            if (total === 0) return '';
            const mismatchTitle = mismatch > 0
                ? ` title="${mismatch} LLDP validation mismatch${mismatch === 1 ? '' : 'es'}"`
                : '';
            if (down > 0) {
                return `<span${mismatchTitle} style="color:#f44336;font-size:12px;margin-left:6px;">⚠ ${up}/${total} links up</span>`;
            }
            return `<span${mismatchTitle} style="color:#555;font-size:12px;margin-left:6px;">${total} links</span>`;
        }
        
        function renderPath(data, sourceIp, destIp, vrf) {
            const resultsContent = document.getElementById('resultsContent');

            const path = Array.isArray(data.path)
                ? data.path.filter(hop => hop && typeof hop === 'object' && !Array.isArray(hop))
                : [];
            const hopCount = path.filter(hop =>
                hop.role !== 'endpoint_src' && hop.role !== 'endpoint_dst'
            ).length;

            setResultsInfo(
                `${hopCount} hop${hopCount > 1 ? 's' : ''} from ${sourceIp} to ${destIp}`,
                data
            );

            // Parse VRFs for source and dest
            const vrfText = toText(vrf);
            const vrfParts = vrfText.includes('->')
                ? vrfText.split('->').map(part => part.trim())
                : [vrfText, vrfText];
            const srcVrf = vrfParts[0] || vrfText;
            const dstVrf = vrfParts[1] || vrfText;
            const sourceDevice = toText(data.source_device);
            const destinationDevice = toText(data.dest_device);
            const routeLeak = data.route_leak && typeof data.route_leak === 'object' && !Array.isArray(data.route_leak)
                ? data.route_leak
                : null;
            const isInterVrf = data.inter_vrf === true || srcVrf !== dstVrf;

            let html = `
                <div class="path-summary">
                    <div class="summary-item">
                        <div class="summary-label">Source IP</div>
                        <div class="summary-value">${escapeHtml(sourceIp)}</div>
                    </div>
                    ${sourceDevice ? `
                    <div class="summary-item">
                        <div class="summary-label">Source Device</div>
                        <div class="summary-value">${escapeHtml(sourceDevice)}</div>
                    </div>
                    ` : ''}
                    <div class="summary-item">
                        <div class="summary-label">Source VRF</div>
                        <div class="summary-value">${escapeHtml(srcVrf)}</div>
                    </div>
                    ${isInterVrf ? `
                    <div class="summary-item">
                        <div class="summary-label">VRF Path</div>
                        <div class="summary-value" style="color:#ff7043;">${escapeHtml(srcVrf)} → ${escapeHtml(dstVrf)}</div>
                    </div>
                    ` : ''}
                    <div class="summary-item">
                        <div class="summary-label">Destination IP</div>
                        <div class="summary-value">${escapeHtml(destIp)}</div>
                    </div>
                    ${destinationDevice ? `
                    <div class="summary-item">
                        <div class="summary-label">Dest Device</div>
                        <div class="summary-value">${escapeHtml(destinationDevice)}</div>
                    </div>
                    ` : ''}
                    <div class="summary-item">
                        <div class="summary-label">Dest VRF</div>
                        <div class="summary-value">${escapeHtml(dstVrf)}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Hops</div>
                        <div class="summary-value hops">${hopCount}</div>
                    </div>
                    ${routeLeak ? `
                    <div class="summary-item">
                        <div class="summary-label">Route Leak</div>
                        <div class="summary-value" style="color:#ffa726;">${escapeHtml(routeLeak.from_vrf)} → ${escapeHtml(routeLeak.to_vrf)} <span style="color:#999;font-size:14px;">(${escapeHtml(routeLeak.prefix)})</span></div>
                    </div>
                    ` : ''}
                </div>
                <div class="path-container" role="list" aria-label="Network path hops">
            `;

            path.forEach((hop, index) => {
                const role = toText(hop.role);
                const tier = Number(hop.tier);
                const isEndpoint = role === 'endpoint_src' || role === 'endpoint_dst';
                const isSource = role === 'source' || role === 'source+destination';
                const isDest = role === 'destination' || role === 'source+destination';
                const isEcmp = role === 'ecmp';
                const isCore = tier === 2 && (isEcmp || role === 'transit');
                const isExternal = role === 'external';
                const isBorder = role === 'border';
                const isLast = index === path.length - 1;

                let hopClass = '';
                if (isEndpoint) hopClass = 'endpoint';
                else if (isExternal) hopClass = 'external';
                else if (isBorder) hopClass = 'border';
                else if (isSource) hopClass = 'source';
                else if (isDest) hopClass = 'destination';
                else if (isCore) hopClass = 'core';
                else if (isEcmp) hopClass = 'ecmp';

                const rawIndent = Number(hop.indent);
                const indentLevel = Number.isFinite(rawIndent)
                    ? Math.min(20, Math.max(0, rawIndent))
                    : 0;
                const indent = Math.round(indentLevel * 60);

                // Endpoint hops (source/dest IP - just a simple line)
                if (isEndpoint) {
                    const label = role === 'endpoint_src' ? 'Source Host' : 'Destination Host';
                    html += `
                        <div class="path-hop" role="listitem" style="margin-left: ${indent}px;">
                            <div class="hop-line">
                                <div class="hop-dot endpoint" aria-hidden="true"></div>
                                ${!isLast ? '<div class="hop-connector"></div>' : ''}
                            </div>
                            <div class="hop-card endpoint">
                                <div class="hop-header">
                                    <div class="hop-device">${escapeHtml(hop.device)} <span style="color:#888;font-size:12px;margin-left:8px;">${label}</span></div>
                                </div>
                            </div>
                        </div>
                    `;
                    return;
                }

                let roleLabel = '';
                if (role === 'source') roleLabel = `<span style="color:#4fc3f7;font-size:12px;margin-left:8px;">Source Leaf</span>`;
                else if (role === 'destination') roleLabel = `<span style="color:#26c6da;font-size:12px;margin-left:8px;">Destination Leaf</span>`;
                else if (role === 'source+destination') roleLabel = `<span style="color:#76b900;font-size:12px;margin-left:8px;">Source &amp; Destination (same device)</span>`;
                else if (isCore && isEcmp) {
                    roleLabel = `<span style="color:#42a5f5;font-size:12px;margin-left:8px;">⇉ ECMP</span>`;
                    roleLabel += linkHealthBadge(hop);
                }
                else if (isEcmp) {
                    roleLabel = `<span style="color:#ffa726;font-size:12px;margin-left:8px;">⇉ ECMP</span>`;
                    roleLabel += linkHealthBadge(hop);
                }
                else if (role === 'external') roleLabel = `<span style="color:#ff7043;font-size:12px;margin-left:8px;">⚡ External (Firewall / Router)</span>`;
                else if (role === 'border') roleLabel = `<span style="color:#ab47bc;font-size:12px;margin-left:8px;">↕ ${escapeHtml(hop.label || 'Border Leaf')}</span>`;
                else if (role === 'transit') {
                    const transitLabel = toText(hop.label) || (tier === 2 ? 'Core' : (tier === 1 ? 'Spine' : 'Transit'));
                    const transitColor = isCore ? '#42a5f5' : '#888';
                    roleLabel = `<span style="color:${transitColor};font-size:12px;margin-left:8px;">${escapeHtml(transitLabel)}</span>`;
                    roleLabel += linkHealthBadge(hop);
                }

                // ECMP device list
                let ecmpDevicesHtml = '';
                if (Array.isArray(hop.devices) && hop.devices.length > 0) {
                    ecmpDevicesHtml = `
                        <div class="ecmp-devices">
                            ${hop.devices.map(device => `<span class="ecmp-device-tag">${escapeHtml(device)}</span>`).join('')}
                        </div>
                    `;
                }

                const hopVrf = toText(hop.vrf);
                const hopInterface = toText(hop.interface);
                const hopNexthop = toText(hop.nexthop);
                const hopPrefix = toText(hop.prefix);
                const hopProtocol = toText(hop.protocol);
                const hopSourceVrf = toText(hop.src_vrf);
                const hopDestinationVrf = toText(hop.dst_vrf);

                html += `
                    <div class="path-hop" role="listitem" style="margin-left: ${indent}px;">
                        <div class="hop-line">
                            <div class="hop-dot ${hopClass}" aria-hidden="true"></div>
                            ${!isLast ? '<div class="hop-connector"></div>' : ''}
                        </div>
                        <div class="hop-card ${hopClass}">
                            <div class="hop-header">
                                <div class="hop-device">
                                    ${escapeHtml(hop.device)}
                                    ${hopVrf && hopVrf !== 'default' ? `<span class="vrf-badge">${escapeHtml(hopVrf)}</span>` : ''}
                                    ${roleLabel}
                                </div>
                            </div>
                            <div class="hop-details">
                                ${hopInterface ? `
                                <div class="hop-detail">
                                    <span class="hop-detail-label">Interface:</span>
                                    <span class="hop-detail-value interface">${escapeHtml(hopInterface)}</span>
                                </div>
                                ` : ''}
                                ${hopNexthop && hopNexthop !== 'ECMP' && !isDest ? `
                                <div class="hop-detail">
                                    <span class="hop-detail-label">Next Hop:</span>
                                    <span class="hop-detail-value nexthop">${escapeHtml(hopNexthop)}</span>
                                </div>
                                ` : ''}
                                ${hopNexthop === 'ECMP' ? `
                                <div class="hop-detail">
                                    <span class="hop-detail-label">Next Hop:</span>
                                    <span class="hop-detail-value nexthop">ECMP (multiple paths)</span>
                                </div>
                                ` : ''}
                                ${hopPrefix && hopPrefix !== 'local' ? `
                                <div class="hop-detail">
                                    <span class="hop-detail-label">Route:</span>
                                    <span class="hop-detail-value">${escapeHtml(hopPrefix)}</span>
                                </div>
                                ` : ''}
                                ${hopProtocol && !isDest && !isExternal ? `
                                <div class="hop-detail">
                                    <span class="hop-detail-label">Protocol:</span>
                                    <span class="hop-detail-value">${escapeHtml(hopProtocol)}</span>
                                </div>
                                ` : ''}
                                ${isExternal && hopSourceVrf ? `
                                <div class="hop-detail">
                                    <span class="hop-detail-label">VRF Transition:</span>
                                    <span class="hop-detail-value" style="color:#ff7043;">${escapeHtml(hopSourceVrf)} → ${escapeHtml(hopDestinationVrf)}</span>
                                </div>
                                ` : ''}
                            </div>
                            ${ecmpDevicesHtml}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            resultsContent.innerHTML = html;
        }

        function resetResultsDisplay() {
            const resultsContent = document.getElementById('resultsContent');
            resultsContent.setAttribute('aria-busy', 'false');
            setResultsInfo('');
            resultsContent.innerHTML = `
                <div class="placeholder-text">
                    Enter source and destination IP addresses and click Trace to discover the network path
                </div>
            `;
        }

        function cancelTraceRequest() {
            traceRequestId += 1;
            const activeController = traceController;
            traceController = null;
            if (activeController) activeController.abort();
            document.getElementById('resultsContent').setAttribute('aria-busy', 'false');
            setTraceButtonLoading(false);
        }

        function cancelActiveTraceForChangedInput() {
            if (!traceController) return;
            cancelTraceRequest();
            resetResultsDisplay();
        }

        function clearResults() {
            cancelTraceRequest();
            cancelDstVrfDetection();
            document.getElementById('destinationIp').value = '';
            syncDstVrf({ preferredVrf: '', preservePrevious: false });
            resetResultsDisplay();
        }
        
        // Debounced auto-detect for destination IP (mirrors the source field)
        document.getElementById('destinationIp').addEventListener('input', function() {
            cancelActiveTraceForChangedInput();
            cancelDstVrfDetection();
            // Never carry a detected VRF from the previous destination address.
            syncDstVrf({ preferredVrf: '', preservePrevious: false });
            dstDetectTimeout = setTimeout(detectDstVrfs, 500);
        });
        document.getElementById('destinationIp').addEventListener('blur', function() {
            if (dstDetectTimeout !== null) clearTimeout(dstDetectTimeout);
            dstDetectTimeout = null;
            detectDstVrfs();
        });

        // Allow Enter key to trigger trace
        document.getElementById('destinationIp').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                tracePath();
            }
        });
        document.getElementById('sourceIp').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('destinationIp').focus();
            }
        });
    </script>

    <!-- Alert Modal (dark themed, replaces browser alert()) -->
    <div id="alert-modal" class="alert-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="alert-modal-title" aria-describedby="alert-modal-message" onclick="if(event.target === this) closeAlertModal()">
        <div class="alert-modal-content" role="document">
            <div class="alert-modal-header">
                <h3 id="alert-modal-title">Validation</h3>
                <button type="button" class="alert-modal-close" aria-label="Close validation dialog" onclick="closeAlertModal()">&times;</button>
            </div>
            <div class="alert-modal-body">
                <p id="alert-modal-message"></p>
            </div>
            <div class="alert-modal-footer">
                <button type="button" class="btn-ok" onclick="closeAlertModal()">OK</button>
            </div>
        </div>
    </div>

    <style>
        .alert-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .alert-modal.visible { display: flex; }
        .alert-modal-content {
            background: #2d2d2d;
            border-radius: 8px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .alert-modal-header {
            background: linear-gradient(135deg, #e65100 0%, #bf360c 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .alert-modal-header h3 { margin: 0; color: #fff; font-size: 16px; }
        .alert-modal-close {
            background: none; border: none; color: #fff;
            font-size: 24px; cursor: pointer; opacity: 0.8;
        }
        .alert-modal-close:hover { opacity: 1; }
        .alert-modal-body { padding: 25px 20px; }
        .alert-modal-body p { color: #ccc; line-height: 1.6; margin: 0; text-align: center; }
        .alert-modal-footer {
            padding: 15px 20px;
            display: flex;
            justify-content: flex-end;
            background: #252526;
            border-top: 1px solid #3c3c3c;
        }
        .alert-modal-footer .btn-ok {
            background: #e65100; color: #fff; border: none;
            padding: 10px 24px; border-radius: 4px; cursor: pointer;
        }
        .alert-modal-footer .btn-ok:hover { background: #ff6d00; }
    </style>

    <script>
        let alertPreviousFocus = null;

        function showAlertModal(message, title = 'Validation') {
            const modal = document.getElementById('alert-modal');
            alertPreviousFocus = document.activeElement;
            document.getElementById('alert-modal-title').textContent = title;
            document.getElementById('alert-modal-message').textContent = message;
            modal.setAttribute('aria-hidden', 'false');
            modal.classList.add('visible');
            modal.querySelector('.alert-modal-close').focus();
        }

        function closeAlertModal() {
            const modal = document.getElementById('alert-modal');
            if (!modal.classList.contains('visible')) return;
            modal.classList.remove('visible');
            modal.setAttribute('aria-hidden', 'true');
            if (alertPreviousFocus && document.contains(alertPreviousFocus)) {
                alertPreviousFocus.focus();
            }
            alertPreviousFocus = null;
        }

        document.getElementById('alert-modal').addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                event.preventDefault();
                closeAlertModal();
                return;
            }
            if (event.key !== 'Tab') return;

            const focusable = [...this.querySelectorAll('button:not([disabled])')];
            if (focusable.length === 0) return;
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (event.shiftKey && document.activeElement === first) {
                event.preventDefault();
                last.focus();
            } else if (!event.shiftKey && document.activeElement === last) {
                event.preventDefault();
                first.focus();
            }
        });
    </script>

    <script>
        (async function() {
            const ok = await LLDPqAuth.check();
            if (!ok) return;
            // Initial data loads run only after the auth check succeeds.
            loadDeviceCount();
            loadAllVrfs();
            applyUrlParams();
        })();
    </script>
